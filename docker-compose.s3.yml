# proxy-cache — full development stack with RustFS (S3), Authentik (OIDC), and Jaeger
#
# Standalone compose file; bring it up with:
#   task compose:s3:up
#
# To start only the infrastructure for local cargo run:
#   task compose:s3:db
#
# ── Rootless Podman prerequisite ─────────────────────────────────────────────
# netavark (default kernel-bridge backend) tries to write to
# /proc/sys/net/ipv4/ping_group_range and fails in rootless user namespaces.
# Switch to pasta (pure user-space, no sysctl required) once:
#   task compose:s3:preflight
# That writes ~/.config/containers/containers.conf and runs podman system migrate.
#
# Exposed ports:
#   9000  — Authentik UI  (akadmin / akadmin)
#   9900  — RustFS S3 API
#   9901  — RustFS console UI
#   16686 — Jaeger tracing UI
#   4317  — OTLP gRPC collector

services:

  # ── PostgreSQL (proxy-cache) ─────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: proxy_cache
      POSTGRES_USER: proxy_cache
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U proxy_cache" ]
      interval: 5s
      timeout: 5s
      retries: 10
    user: "postgres"

  # ── RustFS (S3-compatible object storage) ────────────────────────────────────
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ADDRESS: 0.0.0.0:9900
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9901
      RUSTFS_OBS_LOG_DIRECTORY: /logs
      RUSTFS_VOLUMES: /data
    user: "1000:1000" # run as non-root to avoid permission issues with mounted volumes
    ports:
      - "9900:9900"
      - "9901:9901" # RustFS console UI
    volumes:
      - ./tmp/rustfs/data:/data
      - ./tmp/rustfs/logs:/logs
    # command: |
    #   sh -c "
    #     mkdir -p /data/rustfs
    #     mkdir -p /data/logs
    #     chown -R 1000:1000 /data
    #     server
    #   "
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9900/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── RustFS bucket initialiser (runs once, then exits) ────────────────────────
  # rustfs-init:
  #   image: minio/mc:latest
  #   restart: "no"
  #   user: "1000:1000"
  #   entrypoint: >
  #     /bin/sh -c "
  #       mc alias set local http://rustfs:9900 rustfsadmin rustfsadmin &&
  #       mc mb --ignore-existing local/artifacts &&
  #       echo 'bucket ready'
  #     "

  # ── Authentik (OIDC provider) ─────────────────────────────────────────────────
  # UI: http://localhost:9000  (akadmin / akadmin)
  # ⚠  Credentials below are for LOCAL development only.
  authentik-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    user: "postgres"
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U authentik" ]
      interval: 5s
      timeout: 5s
      retries: 5

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --stop-writes-on-bgsave-error
      - "no"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.2
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_SECRET_KEY: proxy-cache-local-insecure-secret-key
      AUTHENTIK_BOOTSTRAP_PASSWORD: akadmin
      AUTHENTIK_BOOTSTRAP_TOKEN: akadmin-token
    ports:
      - "9000:9000"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    volumes:
      - ./deploy/auth/proxy-cache.yaml:/blueprints/custom/proxy-cache.yaml:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9000/-/health/live/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.2
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_SECRET_KEY: proxy-cache-local-insecure-secret-key
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    volumes:
      - ./deploy/auth/proxy-cache.yaml:/blueprints/custom/proxy-cache.yaml:ro

  # ── Jaeger (OpenTelemetry traces) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317" # OTLP gRPC
      - "16686:16686" # Jaeger UI

volumes:
  postgres_data:
  authentik_postgres_data:
  authentik_redis_data:
