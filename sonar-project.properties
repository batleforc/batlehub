sonar.exclusions=examples/**
sonar.organization=batleforc
sonar.projectKey=batleforc_batlehub
sonar.rust.lcov.reportPaths=lcov.info

# Web:S5256 ("Add <th> headers to this <table>") false-positives: the analyzer can't
# trace <th> through this codebase's <Table>/<TableHeader>/<TableHead> design-system
# components — they compose via slots and already render semantic <th> elements
# (see ui/src/components/ui/table/TableHead.vue). Rewriting every table to raw
# <table>/<th> markup would regress the shared component for no accessibility gain.
sonar.issue.ignore.multicriteria=tableHeaders
sonar.issue.ignore.multicriteria.tableHeaders.ruleKey=Web:S5256
sonar.issue.ignore.multicriteria.tableHeaders.resourceKey=ui/src/**/*.vue