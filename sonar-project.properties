sonar.exclusions=**/examples/**
sonar.organization=batleforc
sonar.projectKey=batleforc_batlehub
sonar.rust.lcov.reportPaths=lcov.info
sonar.javascript.lcov.reportPaths=ui/coverage/lcov.info
sonar.typescript.lcov.reportPaths=ui/coverage/lcov.info
# The entries below mirror Taskfile.yml's COVERAGE_EXCLUDE (used by `task coverage` /
# `task coverage-check`): files that need real Postgres/OIDC/S3 infrastructure (covered
# by `task test:pg-*`, `task test:s3` and the `actions_oidc` suite, which run outside
# this lcov report) or are bootstrap-only wiring with no testable logic.
sonar.coverage.exclusions=website/**,fuzz/**,**/examples/**,ui/src/client/**,perf/**,\
  server/src/main.rs,\
  server/src/server_factory.rs,\
  crates/web/src/handlers/auth/oidc.rs,\
  crates/web/src/handlers/auth/oidc/sso.rs,\
  crates/web/src/handlers/back_office/health/system.rs,\
  crates/adapters/src/db/**,\
  crates/adapters/src/registry/cargo.rs,\
  crates/adapters/src/registry/github.rs,\
  crates/adapters/src/registry/npm.rs,\
  crates/adapters/src/cache/postgres.rs,\
  crates/adapters/src/cache/banner_redis.rs,\
  crates/adapters/src/local_registry/postgres.rs,\
  crates/adapters/src/rate_limit/postgres.rs,\
  crates/adapters/src/rate_limit/ip_block_postgres.rs,\
  crates/adapters/src/storage/router.rs
sonar.cpd.exclusions=fuzz/**,**/examples/**,perf/**

# Web:S5256 ("Add <th> headers to this <table>") false-positives: the analyzer can't
# trace <th> through this codebase's <Table>/<TableHeader>/<TableHead> design-system
# components — they compose via slots and already render semantic <th> elements
# (see ui/src/components/ui/table/TableHead.vue). Rewriting every table to raw
# <table>/<th> markup would regress the shared component for no accessibility gain.
sonar.issue.ignore.multicriteria=tableHeaders,vhtmlSetupGuide,vhtmlCodeBlock
sonar.issue.ignore.multicriteria.tableHeaders.ruleKey=Web:S5256
sonar.issue.ignore.multicriteria.tableHeaders.resourceKey=ui/src/**/*.vue

# Web:S5247 ("Make sure that this markup is sanitized before injecting it by hand") false-positive:
# both v-html usages in SetupGuide.vue bind to fields defined in the static REGISTRY_TYPE_DEFS
# constant (ui/src/config/registryTypes.ts), which is authored at build time and never derived
# from user input. The field is explicitly marked "Trusted internal HTML" in the type definition.
sonar.issue.ignore.multicriteria.vhtmlSetupGuide.ruleKey=Web:S5247
sonar.issue.ignore.multicriteria.vhtmlSetupGuide.resourceKey=ui/src/pages/SetupGuide.vue

# Web:S5247 ("Make sure that this markup is sanitized before injecting it by hand") false-positive:
# CodeBlock.vue's v-html binds to the output of Shiki's codeToHtml(), a trusted syntax-highlighter
# that never receives user input — all code is authored at build-time in REGISTRY_TYPE_DEFS.
sonar.issue.ignore.multicriteria.vhtmlCodeBlock.ruleKey=Web:S5247
sonar.issue.ignore.multicriteria.vhtmlCodeBlock.resourceKey=ui/src/components/ui/code-block/CodeBlock.vue