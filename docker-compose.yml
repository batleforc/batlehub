services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: batlehub
      POSTGRES_USER: batlehub
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U batlehub" ]
      interval: 5s
      timeout: 5s
      retries: 10
    user: "postgres"

  # ── batlehub server ────────────────────────────────────────────────────────
  # server:
  #   build: .
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./config.example.toml:/etc/batlehub/config.toml:ro
  #     - artifact_cache:/var/cache/batlehub
  #   environment:
  #     # Override the DB URL so the server reaches the compose-internal hostname.
  #     BATLEHUB__DATABASE__URL: "postgresql://batlehub:changeme@postgres:5432/batlehub"
  #     # Serve the built SPA from the image.
  #     BATLEHUB__SERVER__STATIC_DIR: "/app/ui/dist"
  #   healthcheck:
  #     test: [ "CMD-SHELL", "curl -sf http://localhost:8080/api/openapi.json || exit 1" ]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  # ── Authentik (optional OIDC provider) ───────────────────────────────────────
  # Start with: docker compose --profile authentik up
  # UI: http://localhost:9000  (user: akadmin / pass: akadmin)
  # ⚠ Credentials below are for LOCAL development only.
  authentik-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [ "authentik" ]
    user: "postgres"
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U authentik" ]
      interval: 5s
      timeout: 5s
      retries: 5

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [ "authentik" ]
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --stop-writes-on-bgsave-error
      - "no"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.2
    restart: unless-stopped
    profiles: [ "authentik" ]
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_SECRET_KEY: batlehub-local-insecure-secret-key
      AUTHENTIK_BOOTSTRAP_PASSWORD: akadmin
      AUTHENTIK_BOOTSTRAP_TOKEN: akadmin-token
    ports:
      - "9000:9000"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    volumes:
      - ./deploy/auth/batlehub.yaml:/blueprints/custom/batlehub.yaml:ro

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.2
    restart: unless-stopped
    profiles: [ "authentik" ]
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_SECRET_KEY: batlehub-local-insecure-secret-key
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    volumes:
      - ./deploy/auth/batlehub.yaml:/blueprints/custom/batlehub.yaml:ro

  # ── OpenTelemetry collector + Jaeger (optional) ───────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    profiles: [ "otel" ]
    ports:
      - "4317:4317" # OTLP gRPC
      - "16686:16686" # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  postgres_data:
  artifact_cache:
  authentik_postgres_data:
  authentik_redis_data:
