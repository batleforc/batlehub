name: Update version
on:
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".updatecli/**"
      - "updatecli-compose.yaml"
      - "Containerfile"
      - "Cargo.toml"
      - "package.json"
      - ".forgejo/workflows/updatecli.yml"
permissions:
  contents: write
  pull-requests: write
jobs:
  updatecli:
    runs-on: kubernetes
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Updatecli
        uses: https://github.com/updatecli/updatecli-action@5bda7da77bf4d181bce5f807d73d832b62062acf # v3.3.0
      - name: "\U0001F980 Install Rust Toolchain"
        uses: https://github.com/dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - name: Run Updatecli
        run: updatecli compose apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
