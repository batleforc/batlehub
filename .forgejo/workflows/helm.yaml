name: Helm Chart Publish

on:
  push:
    branches: ["main"]
    paths:
      - "helm/**"
      - ".forgejo/workflows/helm.yaml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.batleforc.fr

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  publish:
    name: Package and push Helm chart
    enable-openid-connect: true
    runs-on: mise
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: https://git.batleforc.fr/action/checkout@v6

      - name: Create env var with vault CA certificate
        id: cert
        run: echo "VAULT_CA_CERTIFICATE=$(cat "$VAULT_CA_CERT" | base64 -w 0)" >> "$GITHUB_OUTPUT"

      - name: Get credentials from Vault
        uses: https://git.batleforc.fr/action/hashicorp_vault-action@v3
        id: vault
        with:
          url: https://vault.vault:8200
          caCertificate: ${{ steps.cert.outputs.VAULT_CA_CERTIFICATE }}
          method: jwt
          path: forgejo_jwt
          role: forgejo_action
          jwtGithubAudience: forgejo_action
          secrets: |
            git-vault/data/batleforc/batlehub/registry username | REGISTRY_USER ;
            git-vault/data/batleforc/batlehub/registry password | REGISTRY_PAT ;
            git-vault/data/batleforc/batlehub/registry url | REGISTRY ;

      - name: Install Helm
        uses: https://github.com/Azure/setup-helm@v4

      - name: Login to OCI registry
        run: |
          helm registry login ${{ steps.vault.outputs.REGISTRY }} \
            --username ${{ steps.vault.outputs.REGISTRY_USER }} \
            --password ${{ steps.vault.outputs.REGISTRY_PAT }}

      - name: Package chart
        id: package
        run: |
          CHART_VERSION=$(grep '^version:' helm/batlehub/Chart.yaml | awk '{print $2}')
          /usr/local/bin/mise install
          eval "$(/usr/local/bin/mise activate bash)"
          helm package helm/batlehub --destination /tmp/helm-output
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "chart_path=/tmp/helm-output/batlehub-${CHART_VERSION}.tgz" >> "$GITHUB_OUTPUT"

      - name: Push chart to Harbor
        run: |
          helm push ${{ steps.package.outputs.chart_path }} \
            oci://${{ steps.vault.outputs.REGISTRY }}/batleforc/chart
