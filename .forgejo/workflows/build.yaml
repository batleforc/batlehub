name: Container Build
on:
  push:
    branches: ["main"]
    paths:
      - "**/*.rs"
      - "**/*.css"
      - "**/*.js"
      - "**/*.toml"
      - "**/*.yaml"
      - "**/*.json"
      - "Cargo.lock"
      - ".dockerignore"
      - "Containerfile"
      - "Containerfile.hardened"
      - ".forgejo/workflows/build.yaml"
  workflow_dispatch:
  schedule:
    - cron: "50 23 * * *"
permissions:
  contents: read
env:
  REGISTRY: registry.batleforc.fr
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build:
    name: Build container images
    enable-openid-connect: true # Required for vault authentication
    runs-on: buildah
    strategy:
      matrix:
        include:
          - name: "Backend Container"
            context: .
            dockerfile: Containerfile
            image_name: batleforc/batlehub
          - name: "Backend Hardened Container"
            context: .
            dockerfile: Containerfile.hardened
            image_name: batleforc/batlehub-hardened
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: https://git.batleforc.fr/action/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create env var with vault CA certificate
        id: cert
        run: echo "VAULT_CA_CERTIFICATE=$(cat "$VAULT_CA_CERT" | base64 -w 0)">> "$GITHUB_OUTPUT"
      - name: Get env variables from vault
        uses: https://git.batleforc.fr/action/hashicorp_vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        id: vault
        with:
          url: https://vault.vault:8200
          caCertificate: ${{ steps.cert.outputs.VAULT_CA_CERTIFICATE }}
          method: jwt
          path: forgejo_jwt
          role: forgejo_action
          jwtGithubAudience: forgejo_action
          secrets: |
            git-vault/data/batleforc/batlehub/registry username | REGISTRY_USER ;
            git-vault/data/batleforc/batlehub/registry password | REGISTRY_PAT ;
            git-vault/data/batleforc/batlehub/registry url | REGISTRY ;
      - run: buildah login --username ${{ steps.vault.outputs.REGISTRY_USER }} --password ${{ steps.vault.outputs.REGISTRY_PAT }} ${{ steps.vault.outputs.REGISTRY }}
      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            curl -sfL -o /usr/local/bin/jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
            chmod +x /usr/local/bin/jq
          fi
      - name: Build Image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ matrix.image_name }}:${GITHUB_SHA}"
          IMAGE_TAG_BRANCH="${{ env.REGISTRY }}/${{ matrix.image_name }}:${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          buildah bud  \
            --platform linux/amd64 \
            --layers \
            --cache-to=${{ env.REGISTRY }}/${{ matrix.image_name }}/cache \
            --cache-from=${{ env.REGISTRY }}/${{ matrix.image_name }}/cache \
            --tag $IMAGE_TAG \
            --tag $IMAGE_TAG_BRANCH \
            --file ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          buildah push $IMAGE_TAG
          buildah push $IMAGE_TAG_BRANCH
      # Harbor scans every push automatically (project-level "scan on push") and
      # generates its own SBOM accessory, so don't redo that work locally. Poll
      # its API for up to ~1 minute for the vulnerability report on the digest we
      # just pushed.
      - name: Wait for Harbor scan result
        id: harbor_scan
        run: |
          IMAGE_NAME="${{ matrix.image_name }}"
          PROJECT="${IMAGE_NAME%%/*}"
          REPO="${IMAGE_NAME#*/}"
          API="https://${{ env.REGISTRY }}/api/v2.0/projects/${PROJECT}/repositories/${REPO}/artifacts/${GITHUB_SHA}?with_scan_overview=true"
          AUTH="${{ steps.vault.outputs.REGISTRY_USER }}:${{ steps.vault.outputs.REGISTRY_PAT }}"
          STATUS="Pending"
          for _ in $(seq 1 12); do
            STATUS=$(curl -s -u "$AUTH" "$API" | jq -r '.scan_overview["application/vnd.security.vulnerability.report; version=1.1"].scan_status // "Pending"') || STATUS="Pending"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Error" ]; then
              break
            fi
            sleep 5
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
      # Gate: fail the build on any fixable HIGH/CRITICAL CVE in Harbor's report.
      # Forgejo has no Security tab, so the exit code IS the gate; a short
      # summary table is printed first for triage. Mirrors the previous
      # `trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1`.
      - name: Gate on Harbor vulnerability report
        if: steps.harbor_scan.outputs.status == 'Success'
        run: |
          IMAGE_NAME="${{ matrix.image_name }}"
          PROJECT="${IMAGE_NAME%%/*}"
          REPO="${IMAGE_NAME#*/}"
          API="https://${{ env.REGISTRY }}/api/v2.0/projects/${PROJECT}/repositories/${REPO}/artifacts/${GITHUB_SHA}/additions/vulnerabilities"
          AUTH="${{ steps.vault.outputs.REGISTRY_USER }}:${{ steps.vault.outputs.REGISTRY_PAT }}"
          curl -s -u "$AUTH" -H "Accept: application/vnd.security.vulnerability.report; version=1.1" "$API" -o vulns.json
          jq -r '.vulnerabilities[]? | select((.severity == "Critical" or .severity == "High") and (.fix_version // "") != "") | [.severity, .package, .version, .fix_version, .id] | @tsv' vulns.json | tee fixable.tsv
          if [ -s fixable.tsv ]; then
            echo "::error::Harbor reported fixable HIGH/CRITICAL vulnerabilities for $IMAGE_TAG"
            exit 1
          fi
      # Best-effort gate only: if Harbor hasn't finished scanning within the
      # 1-minute window, don't block the build — warn and move on.
      - name: Harbor scan not ready
        if: steps.harbor_scan.outputs.status != 'Success'
        run: |
          echo "::warning::Harbor scan result not ready within 1 minute for $IMAGE_TAG (status: ${{ steps.harbor_scan.outputs.status }}); skipping vulnerability gate"
