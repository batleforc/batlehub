name: Container Build
on:
  push:
    branches: ["main"]
    paths:
      - "**/*.rs"
      - "**/*.css"
      - "**/*.js"
      - "**/*.toml"
      - "**/*.yaml"
      - "**/*.json"
      - "Cargo.lock"
      - ".dockerignore"
      - "Containerfile"
      - "Containerfile.hardened"
      - ".forgejo/workflows/build.yaml"
  workflow_dispatch:
  schedule:
    - cron: "50 23 * * *"
permissions:
  contents: read
env:
  REGISTRY: registry.batleforc.fr
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build:
    name: Build container images
    enable-openid-connect: true # Required for vault authentication
    runs-on: buildah
    strategy:
      matrix:
        include:
          - name: "Backend Container"
            context: .
            dockerfile: Containerfile
            image_name: batleforc/batlehub
          - name: "Backend Hardened Container"
            context: .
            dockerfile: Containerfile.hardened
            image_name: batleforc/batlehub-hardened
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: https://git.batleforc.fr/action/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create env var with vault CA certificate
        id: cert
        run: echo "VAULT_CA_CERTIFICATE=$(cat "$VAULT_CA_CERT" | base64 -w 0)">> "$GITHUB_OUTPUT"
      - name: Get env variables from vault
        uses: https://git.batleforc.fr/action/hashicorp_vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        id: vault
        with:
          url: https://vault.vault:8200
          caCertificate: ${{ steps.cert.outputs.VAULT_CA_CERTIFICATE }}
          method: jwt
          path: forgejo_jwt
          role: forgejo_action
          jwtGithubAudience: forgejo_action
          secrets: |
            git-vault/data/batleforc/batlehub/registry username | REGISTRY_USER ;
            git-vault/data/batleforc/batlehub/registry password | REGISTRY_PAT ;
            git-vault/data/batleforc/batlehub/registry url | REGISTRY ;
      - run: buildah login --username ${{ steps.vault.outputs.REGISTRY_USER }} --password ${{ steps.vault.outputs.REGISTRY_PAT }} ${{ steps.vault.outputs.REGISTRY }}
      - name: Install Trivy & Syft
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.0
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh        | sh -s -- -b /usr/local/bin v1.45.1
      - name: Build Image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ matrix.image_name }}:${GITHUB_SHA}"
          IMAGE_TAG_BRANCH="${{ env.REGISTRY }}/${{ matrix.image_name }}:${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          buildah bud  \
            --platform linux/amd64 \
            --layers \
            --cache-to=${{ env.REGISTRY }}/${{ matrix.image_name }}/cache \
            --cache-from=${{ env.REGISTRY }}/${{ matrix.image_name }}/cache \
            --tag $IMAGE_TAG \
            --tag $IMAGE_TAG_BRANCH \
            --file ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          buildah push $IMAGE_TAG
          buildah push $IMAGE_TAG_BRANCH
      # Generate a CycloneDX SBOM of the just-built image (from local
      # containers-storage — no registry pull). Kept in the workspace; the GitHub
      # release path publishes + attests the canonical SBOM.
      - name: Generate image SBOM (Syft)
        run: syft "containers-storage:$IMAGE_TAG" -o cyclonedx-json="sbom-${{ matrix.image_name }}.cdx.json"
      # Gate: scan the local image and fail the build on any fixable HIGH/CRITICAL
      # CVE. Forgejo has no Security tab, so the exit code IS the gate; a human
      # readable table is printed first for triage.
      - name: Trivy scan (report)
        run: trivy image --image-src podman --severity HIGH,CRITICAL --ignore-unfixed --format table "$IMAGE_TAG"
      - name: Trivy scan (gate)
        run: trivy image --image-src podman --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 "$IMAGE_TAG"
