name: Publish
on:
  push:
    branches:
      - main
    paths:
      - website/**
  workflow_dispatch:

jobs:
  publish:
    runs-on: git-pages
    name: Publish batlehub website
    enable-openid-connect: true # Required for vault authentication
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build website
        run: |
          cd website
          yarn install
          yarn run docs:build
      - name: Publish to Git Pages
        run: |
          git-pages-cli https://${{ github.repository_owner }}.git.batleforc.fr/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --upload-dir website/dist
