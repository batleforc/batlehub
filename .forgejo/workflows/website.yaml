name: Publish
on:
  push:
    branches:
      - main
    paths:
      - website/**
      - .forgejo/workflows/website.yaml
  workflow_dispatch:
jobs:
  publish:
    runs-on: git-pages
    name: Publish batlehub website
    enable-openid-connect: true # Required for vault authentication
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The runner has no pnpm of its own. Same action/pin as updatecli.yml.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - name: Build website
        env:
          BASE_URL: /batlehub/
        run: |
          cd website
          pnpm install --frozen-lockfile
          pnpm run docs:build
          cp -R .vitepress/dist ../dist
          cd ..
          ls -la dist
      - name: Publish to Git Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git-pages-cli https://${{ github.repository_owner }}.git.batleforc.fr/batlehub --token ${{ secrets.GITHUB_TOKEN }} --upload-dir dist
