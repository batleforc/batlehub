name: Repo interop (apt/dnf/pacman)
# Confirms that real `apt`, `dnf`, and `pacman` accept BatleHub's Deb/RPM/pacman
# repositories — the hand-rolled Ed25519 OpenPGP signatures and generated indexes —
# end to end.
on:
  push:
    branches: ["main"]
    paths:
      - "crates/adapters/src/repo/**"
      - "crates/adapters/tests/repo_interop.rs"
      - "tests/interop/**"
      - ".github/workflows/repo-interop.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "crates/adapters/src/repo/**"
      - "crates/adapters/tests/repo_interop.rs"
      - "tests/interop/**"
      - ".github/workflows/repo-interop.yaml"
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  interop:
    name: apt + dnf + pacman accept signed repos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "stable"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      # ubuntu-latest ships Docker; verify.sh auto-detects docker or podman.
      - name: Verify apt + dnf + pacman interop
        run: bash tests/interop/verify.sh
