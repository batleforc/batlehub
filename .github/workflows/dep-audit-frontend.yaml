name: Frontend dependency audit
on:
  push:
    branches: ["main"]
    paths:
      - "ui/package.json"
      - "ui/package-lock.json"
      - "website/package.json"
      - "website/package-lock.json"
      - ".github/workflows/dep-audit-frontend.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "ui/package.json"
      - "ui/package-lock.json"
      - "website/package.json"
      - "website/package-lock.json"
      - ".github/workflows/dep-audit-frontend.yaml"
  # Daily so a CVE disclosed against an already-pinned dependency trips CI even
  # when nothing in the repo changed.
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    name: npm audit — ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: ui
            audit-args: ""
          # vitepress (and its transitive vite/esbuild) are build-only tooling
          # for the static site, never shipped or run as a service. Their
          # current advisories have no fix available upstream for vitepress 1.x
          # and don't apply to this repo's build; runtime deps (e.g. hash-wasm)
          # are still audited. Keep in sync with `task website:audit`.
          - workspace: website
            audit-args: "--omit=dev"
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      # Audit the committed lockfile directly — no install, no lifecycle scripts.
      # Fails the job on any high/critical advisory.
      - name: npm audit
        run: npm audit --audit-level=high ${{ matrix.audit-args }}
