name: Frontend dependency audit
on:
  push:
    branches: ["main"]
    paths:
      - "ui/package.json"
      - "ui/pnpm-lock.yaml"
      - "website/package.json"
      - "website/pnpm-lock.yaml"
      - ".github/workflows/dep-audit-frontend.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "ui/package.json"
      - "ui/pnpm-lock.yaml"
      - "website/package.json"
      - "website/pnpm-lock.yaml"
      - ".github/workflows/dep-audit-frontend.yaml"
  # Daily so a CVE disclosed against an already-pinned dependency trips CI even
  # when nothing in the repo changed.
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    name: pnpm audit — ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: ui
            audit-args: ""
          # vitepress (and its transitive vite/esbuild) are build-only tooling
          # for the static site, never shipped or run as a service. Their
          # current advisories have no fix available upstream for vitepress 1.x
          # and don't apply to this repo's build; runtime deps (e.g. hash-wasm)
          # are still audited. Keep in sync with `task website:audit`.
          - workspace: website
            audit-args: "--prod"
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      # Same action/pin as .forgejo/workflows/updatecli.yml. Corepack is not used:
      # Node stopped distributing it in v25.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      # Audit resolves straight from the committed pnpm-lock.yaml — no install,
      # no lifecycle scripts. It covers the whole tree (direct + transitive) and
      # fails the job on any high/critical advisory.
      - name: pnpm audit
        run: pnpm audit --audit-level high ${{ matrix.audit-args }}
