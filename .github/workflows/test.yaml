name: Test
on:
  push:
    branches: ["main"]
    paths:
      - "crates/**"
      - "server/**"
      - "fuzz/**"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/test.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "crates/**"
      - "server/**"
      - "fuzz/**"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/test.yaml"
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      # CI fails on any warning — clippy is denied, formatting must be clean.
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: rustfmt
        run: cargo fmt --all --check
  unit:
    name: Unit & doc tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      - name: Run workspace tests
        run: cargo test --workspace
  integration-postgres:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/postgres
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      - name: Run pg_cache integration tests
        run: cargo test -p batlehub-adapters --test pg_cache -- --nocapture
      - name: Run local_registry integration tests
        run: cargo test -p batlehub-adapters --test local_registry -- --nocapture
      - name: Run pg_rate_limit integration tests
        run: cargo test -p batlehub-adapters --test pg_rate_limit -- --nocapture
  integration-s3:
    name: Integration tests (S3 / MinIO)
    runs-on: ubuntu-latest
    services:
      minio:
        image: rustfs/rustfs:latest
        env:
          RUSTFS_ROOT_USER: minioadmin
          RUSTFS_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    env:
      S3_TEST_ENDPOINT: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      - name: Run s3_storage integration tests
        run: cargo test -p batlehub-adapters --features storage-s3 --test s3_storage -- --nocapture
  integration-redis:
    name: Integration tests (Redis)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      - name: Run redis_cache integration tests
        run: cargo test -p batlehub-adapters --features cache-redis --test redis_cache -- --nocapture
      - name: Run redis_rate_limit integration tests
        run: cargo test -p batlehub-adapters --features cache-redis --test redis_rate_limit -- --nocapture
