name: Frontend Test
on:
  push:
    branches: ["main"]
    paths:
      - "ui/**/*.ts"
      - "ui/**/*.vue"
      - "ui/package.json"
      - "ui/pnpm-lock.yaml"
      - "ui/vite.config.ts"
      - ".github/workflows/front-test.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "ui/**/*.ts"
      - "ui/**/*.vue"
      - "ui/package.json"
      - "ui/pnpm-lock.yaml"
      - "ui/vite.config.ts"
      - ".github/workflows/front-test.yaml"
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # pnpm must be installed before setup-node so its cache step can resolve
      # the pnpm store directory. Same action/pin as .forgejo/workflows/updatecli.yml.
      # (Corepack is not used: Node stopped distributing it in v25.)
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      # --frozen-lockfile fails the job if pnpm-lock.yaml would need updating
      # (the `npm ci` equivalent). Install-time lifecycle scripts stay blocked by
      # pnpm's default deny + the `allowBuilds` list in ui/pnpm-workspace.yaml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        working-directory: .
        run: cargo run -p batlehub-server -- --config config.example.toml dump-spec > ui/openapi.json
      - name: Generate TypeScript client
        run: pnpm run generate
      - name: Run tests with coverage
        run: pnpm run coverage
