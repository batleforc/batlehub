name: Container image scan
on:
  push:
    branches: ["main"]
    paths:
      - "Containerfile"
      - "Cargo.lock"
      - "ui/package-lock.json"
      - ".github/workflows/image-scan.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "Containerfile"
      - "Cargo.lock"
      - "ui/package-lock.json"
      - ".github/workflows/image-scan.yaml"
  # Daily rebuild + rescan so a CVE disclosed against a base/OS layer AFTER the
  # last build still trips CI — this is the "future CVE" detection, not just a
  # build-time snapshot.
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  scan:
    name: Build & Trivy scan (Containerfile)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build image (load, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Containerfile
          load: true
          push: false
          tags: batlehub:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Produce SARIF for the Security tab (does not fail the build).
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: batlehub:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-containerfile
      # The gate: fail the job on any fixable HIGH/CRITICAL OS or library CVE.
      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: batlehub:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
