name: Release
on:
  push:
    tags:
      - "*"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_NAMESPACE: oci://ghcr.io/${{ github.repository }}/charts
jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version="${tag_name#v}"
          echo "tag=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
  server:
    name: Build and publish server binary
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      - name: Build release binary
        shell: bash
        run: cargo build --release --locked -p batlehub-server
      # CycloneDX SBOM of the Rust workspace — lets a future-disclosed crate CVE
      # be matched against this exact shipped build (`trivy sbom sbom-rust.cdx.json`).
      - name: Generate Rust SBOM (CycloneDX)
        shell: bash
        run: |
          cargo install --locked cargo-cyclonedx
          # cargo-cyclonedx writes one <crate>.cdx.json per workspace member next
          # to its manifest; keep only the server's, for the release upload below.
          cargo cyclonedx --format json --manifest-path server/Cargo.toml
          cp server/batlehub-server.cdx.json sbom-rust.cdx.json
          find . -maxdepth 3 -name '*.cdx.json' -not -path './sbom-rust.cdx.json' -delete
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          files: |
            target/release/batlehub
            sbom-rust.cdx.json
          fail_on_unmatched_files: true
  cli:
    name: CLI — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: meta
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: batlehub-cli
            archive: batlehub-cli-linux-amd64.tar.gz
            use_cross: true
            windows: false
          - name: Linux aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: batlehub-cli
            archive: batlehub-cli-linux-arm64.tar.gz
            use_cross: true
            windows: false
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: batlehub-cli.exe
            archive: batlehub-cli-windows-amd64.zip
            use_cross: false
            windows: true
          - name: macOS aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: batlehub-cli
            archive: batlehub-cli-darwin-arm64.tar.gz
            use_cross: false
            windows: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cross
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked -p batlehub-cli --target ${{ matrix.target }}
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --locked -p batlehub-cli --target ${{ matrix.target }}
      - name: Stage artifact (Unix)
        if: "!matrix.windows"
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" batlehub-cli
          tar czf "${{ matrix.archive }}" batlehub-cli
      - name: Stage artifact (Windows)
        if: matrix.windows
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" batlehub-cli.exe
          Compress-Archive -Path batlehub-cli.exe -DestinationPath "${{ matrix.archive }}"
      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          files: ${{ matrix.archive }}
          fail_on_unmatched_files: true
  image:
    name: Build and push container image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: write
      packages: write
      security-events: write # upload Trivy SARIF
      id-token: write # SBOM / provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Scan the published image. Prevention happens earlier (image-scan.yaml on
      # PRs + the daily rebuild-and-scan); this is the release backstop and feeds
      # the Security tab.
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release-image
      # Generate a CycloneDX SBOM of the published image and attest it.
      - name: Generate image SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-image.cdx.json
          artifact-name: sbom-image.cdx.json
      - name: Attest image SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-image.cdx.json
          push-to-registry: true
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Attach image SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          files: sbom-image.cdx.json
      # Final gate — fail the release run on any fixable HIGH/CRITICAL CVE.
      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
  chart:
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.3
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package chart
        shell: bash
        run: |
          mkdir -p dist
          helm package helm/batlehub \
            --destination dist \
            --version "${{ needs.meta.outputs.version }}" \
            --app-version "${{ needs.meta.outputs.version }}"
      - name: Push chart to GHCR
        shell: bash
        run: |
          helm push "dist/batlehub-${{ needs.meta.outputs.version }}.tgz" "${CHART_NAMESPACE}"
