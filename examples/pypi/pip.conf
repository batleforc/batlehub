# Copy to ~/.pip/pip.conf (Linux/macOS) or %APPDATA%\pip\pip.ini (Windows).
# Redirects all pip installs through the batlehub proxy.
[global]
index-url = http://localhost:8080/proxy/my-pypi/simple/
trusted-host = localhost
extra-index-url =

[install]
# Pass the token as Basic auth: any username, token as password.
# pip reads credentials from the URL or from ~/.netrc:
#   machine localhost login user password change-me-user-token
