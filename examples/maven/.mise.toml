[tools]
java = "temurin-21"
maven = "3.9"

[tasks.package]
description = "Build and package through the proxy"
run = "mvn -s settings.xml package -DskipTests"

[tasks.test]
description = "Run tests (downloads via proxy)"
run = "mvn -s settings.xml test"

[tasks.run]
description = "Run the Spring Boot application"
run = "mvn -s settings.xml spring-boot:run"

[tasks.clean]
description = "Clean build artifacts"
run = "mvn clean"
