[tools]
terraform = "1.8"

[env]
TF_CLI_CONFIG_FILE = "{{cwd}}/.terraformrc"

[tasks.init]
description = "Initialise providers through the proxy mirror"
run = "terraform init"

[tasks.plan]
description = "Preview infrastructure changes"
run = "terraform plan"

[tasks.apply]
description = "Apply infrastructure changes"
run = "terraform apply"

[tasks.destroy]
description = "Destroy provisioned infrastructure"
run = "terraform destroy"
