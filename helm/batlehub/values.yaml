# Default values for batlehub.
# Override with: helm install batlehub ./helm/batlehub -f my-values.yaml

replicaCount: 1

image:
  repository: ghcr.io/batleforc/batlehub
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to Chart.appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  # No RBAC roles are bound to this ServiceAccount, so the projected token
  # would be unused — disable automounting it into the pod. Automatically
  # forced to true (regardless of this value) when config.auth contains a
  # `type = "kubernetes"` entry, since that provider reads its own projected
  # token to call the TokenReview API.
  automountServiceAccountToken: false
  rbac:
    # Auto-create a ClusterRole + ClusterRoleBinding granting this
    # ServiceAccount `create` on authentication.k8s.io/tokenreviews,
    # whenever config.auth contains an entry with type = "kubernetes".
    # Set to false if you manage this ClusterRoleBinding yourself or point
    # at an existing ServiceAccount that already has it.
    autoTokenReview: true

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: batlehub.example.com
  tls: []
  #  - secretName: batlehub-tls
  #    hosts:
  #      - batlehub.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 256Mi
  limits:
    memory: 512Mi
    ephemeral-storage: 1Gi

# ── Environment variables ─────────────────────────────────────────────────────
# Injected into the container at runtime. Use together with ${VAR_NAME}
# placeholders inside config values — BatleHub expands them before parsing
# the TOML file.
#
# If a placeholder references a variable that is not present in the container,
# BatleHub exits immediately with a clear error naming the missing variable.
#
# Plain literal value (avoid for real secrets — use secretKeyRef instead):
# env:
#   - name: OIDC_CLIENT_SECRET
#     value: "my-secret"
#
# From a Kubernetes Secret (recommended):
# env:
#   - name: OIDC_CLIENT_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: batlehub-secrets
#         key: oidc-client-secret
#   - name: REGISTRY_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: batlehub-secrets
#         key: registry-token
env: []

# Inject every key from a Secret or ConfigMap as env vars (bulk import):
# envFrom:
#   - secretRef:
#       name: batlehub-secrets      # all keys become env vars
#   - configMapRef:
#       name: batlehub-env
envFrom: []

nodeSelector: {}
tolerations: []
affinity: {}

# ── BatleHub application config ───────────────────────────────────────────────
# This object is serialized verbatim to config.toml via toToml.
# All keys must be snake_case to match batlehub's TOML field names.
# Optional top-level sections (otel, cache, limits, ip_blocking) must be
# entirely absent — not null or {} — to be omitted from the rendered TOML.
config:

  # ── [server] ────────────────────────────────────────────────────────────────
  server:
    host: "0.0.0.0"
    port: 8080
    # static_dir: "/app/ui/dist"
    # cors_allowed_origins:
    #   - "https://batlehub.example.com"

  # ── [database] ──────────────────────────────────────────────────────────────
  database:
    type: "postgresql"
    url: "postgresql://batlehub:changeme@postgres:5432/batlehub"

  # ── [storage] ───────────────────────────────────────────────────────────────
  # Filesystem (default):
  storage:
    type: "filesystem"
    path: "/var/cache/batlehub"
  # S3 — replace the entire storage block with:
  # storage:
  #   type: "s3"
  #   bucket: ""
  #   region: "us-east-1"
  #   endpoint_url: ""       # omit for AWS S3; set for MinIO/RustFS
  #   force_path_style: true # required for MinIO, RustFS, etc.
  #   prefix: ""             # optional: store under a bucket subfolder

  # ── [[auth]] ────────────────────────────────────────────────────────────────
  # Each list entry becomes a [[auth]] TOML block. The "type" key is required.
  # Supported types: token | oidc | kubernetes | actions-oidc
  auth:
    - type: "token"
      tokens:
        - value: "change-me-admin-token"
          role: "admin"
          user_id: "admin"
    # OIDC provider (uncomment and fill in to enable):
    # - type: "oidc"
    #   issuer_url: "https://sso.example.com/application/o/batlehub/"
    #   client_id: "batlehub"
    #   client_secret: "${OIDC_CLIENT_SECRET}"  # inject via env.secretKeyRef below
    #   redirect_uri: "https://batlehub.example.com/api/v1/auth/oidc/callback"
    #   scopes:
    #     - openid
    #     - profile
    #     - email
    #     - groups
    #   user_id_claim: "preferred_username"
    #   role_claim: "groups"
    #   role_mappings:
    #     "authentik Admins": "admin"
    #     "proxy-users": "user"

  # ── [[registries]] ──────────────────────────────────────────────────────────
  # Each list entry becomes a [[registries]] TOML block.
  # Supported types: npm | cargo | goproxy | pypi | conda | maven | terraform
  #                  rubygems | github | openvsx | vscode-marketplace | composer
  # mode: proxy (default) | local | hybrid
  registries:
    - type: "npm"
      name: "npm"
      rbac:
        anonymous:
          - "releases:read"
          - "source:read"
        user:
          - "releases:read"
          - "source:read"
        admin:
          - "*"

  # ── [otel] ──────────────────────────────────────────────────────────────────
  # Uncomment to enable OpenTelemetry tracing. Must be absent (not null) to disable.
  # otel:
  #   endpoint: "http://jaeger:4317"
  #   service_name: "batlehub"

  # ── [cache] ──────────────────────────────────────────────────────────────────
  # Metadata cache backend. Defaults to in-memory when absent.
  # cache:
  #   type: "redis"   # memory | postgres | redis
  #   url: "redis://localhost:6379"

  # ── [limits] ────────────────────────────────────────────────────────────────
  # limits:
  #   max_artifact_size_bytes: 524288000  # 500 MiB

  # ── [ip_blocking] ───────────────────────────────────────────────────────────
  # ip_blocking:
  #   enabled: true
  #   violation_threshold: 10
  #   violation_window_secs: 300
  #   ban_duration_secs: 3600

# ── Persistent storage for the artifact cache (filesystem mode) ───────────────
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  # existingClaim: ""

# ── Extra / external manifests ────────────────────────────────────────────────
# 0..N additional Kubernetes manifests rendered by this chart. Each entry:
#   name      - logical name; the K8s object name referenced by `mount`
#               (secretName / configMap name) and used as the
#               `extra-<name>` volume name.
#   enabled   - default true.
#   kind      - "Secret" | "ConfigMap"; required only when `mount` is set.
#   manifest  - raw YAML for one Kubernetes object, rendered with `tpl`
#               (can reference .Values/.Release/.Chart). Omit to reference
#               a resource created outside this chart (e.g. by Sealed
#               Secrets / External Secrets Operator / Vault Agent) — nothing
#               is rendered, but `mount` can still reference it by `name`.
#   mount     - optional, only valid for kind Secret/ConfigMap:
#     asConfig  - if true, this entry replaces the chart-managed config
#                 Secret as the source of /etc/batlehub/config.toml.
#                 At most one entry may set this.
#     mountPath - container mount path. Required unless asConfig.
#     subPath   - optional subPath within the volume.
#     items     - optional [{key, path}] projection; defaults to projecting
#                 every key in the resource under its own name.
#     readOnly  - default true.
externalManifest: []
# Examples:
# externalManifest:
#   # config.toml from a Secret managed by an External Secrets Operator —
#   # nothing rendered, just mounted as the main config.
#   - name: batlehub-config-eso
#     kind: Secret
#     mount:
#       asConfig: true
#       items:
#         - key: config.toml
#           path: config.toml
#   # An extra ConfigMap the chart creates and mounts a single key from.
#   - name: extra-ca-bundle
#     kind: ConfigMap
#     manifest: |
#       apiVersion: v1
#       kind: ConfigMap
#       metadata:
#         name: extra-ca-bundle
#       data:
#         ca.crt: |
#           -----BEGIN CERTIFICATE-----
#           ...
#     mount:
#       mountPath: /etc/ssl/certs/extra
#       items:
#         - key: ca.crt
#           path: ca.crt
#   # A standalone resource that is never mounted.
#   - name: batlehub-allow-egress
#     manifest: |
#       apiVersion: networking.k8s.io/v1
#       kind: NetworkPolicy
#       metadata:
#         name: batlehub-allow-egress
#       spec:
#         ...
