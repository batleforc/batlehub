{{- if and (eq (include "batlehub.kubernetesAuthEnabled" .) "true") .Values.serviceAccount.rbac.autoTokenReview }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "batlehub.fullname" . }}-{{ .Release.Namespace }}-tokenreview
  labels:
    {{- include "batlehub.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "batlehub.fullname" . }}-{{ .Release.Namespace }}-tokenreview
  labels:
    {{- include "batlehub.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "batlehub.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "batlehub.fullname" . }}-{{ .Release.Namespace }}-tokenreview
{{- end }}
