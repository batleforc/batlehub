{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) (eq .Values.storage.type "filesystem") -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "batlehub.fullname" . }}-cache
  labels:
    {{- include "batlehub.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
