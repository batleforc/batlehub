{{- if and .Values.externalManifest.enabled
    (not (or (eq .Values.externalManifest.kind "Secret")
             (eq .Values.externalManifest.kind "ConfigMap"))) }}
{{- fail (printf "externalManifest.kind must be 'Secret' or 'ConfigMap', got: %s" .Values.externalManifest.kind) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "batlehub.fullname" . }}
  labels:
    {{- include "batlehub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "batlehub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not .Values.externalManifest.enabled }}
        checksum/config: {{ include "batlehub.config" . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "batlehub.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "batlehub.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: config
          {{- if .Values.externalManifest.enabled }}
          {{- if eq .Values.externalManifest.kind "ConfigMap" }}
          configMap:
            name: {{ .Values.externalManifest.name }}
            items:
              - key: {{ .Values.externalManifest.key }}
                path: config.toml
          {{- else }}
          secret:
            secretName: {{ .Values.externalManifest.name }}
            items:
              - key: {{ .Values.externalManifest.key }}
                path: config.toml
          {{- end }}
          {{- else }}
          secret:
            secretName: {{ include "batlehub.fullname" . }}-config
            items:
              - key: config.toml
                path: config.toml
          {{- end }}
        {{- if and .Values.persistence.enabled (eq .Values.config.storage.type "filesystem") }}
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-cache" (include "batlehub.fullname" .)) }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/batlehub/config.toml
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/batlehub
              readOnly: true
            {{- if and .Values.persistence.enabled (eq .Values.config.storage.type "filesystem") }}
            - name: cache
              mountPath: {{ .Values.config.storage.path }}
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
