{{- $configEntry := include "batlehub.configManifestEntry" . | fromYaml }}
{{- $asConfigCount := 0 }}
{{- range .Values.externalManifest }}
{{- if and (eq (include "batlehub.manifestEnabled" .) "true") .mount }}
{{- if not (or (eq .kind "Secret") (eq .kind "ConfigMap")) }}
{{- fail (printf "externalManifest %q: mount requires kind to be 'Secret' or 'ConfigMap', got: %s" .name .kind) }}
{{- end }}
{{- if .mount.asConfig }}
{{- $asConfigCount = add $asConfigCount 1 }}
{{- else if not .mount.mountPath }}
{{- fail (printf "externalManifest %q: mount.mountPath is required unless mount.asConfig is true" .name) }}
{{- end }}
{{- end }}
{{- end }}
{{- if gt $asConfigCount 1 }}
{{- fail "externalManifest: only one entry may set mount.asConfig: true" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "batlehub.fullname" . }}
  labels:
    {{- include "batlehub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "batlehub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not $configEntry.name }}
        checksum/config: {{ include "batlehub.config" . | sha256sum }}
        {{- end }}
        {{- $mountedManifests := list }}
        {{- range .Values.externalManifest }}
        {{- if and (eq (include "batlehub.manifestEnabled" .) "true") .mount .manifest }}
        {{- $mountedManifests = append $mountedManifests . }}
        {{- end }}
        {{- end }}
        {{- if $mountedManifests }}
        checksum/extra-manifests: {{ $mountedManifests | toYaml | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "batlehub.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "batlehub.serviceAccountName" . }}
      automountServiceAccountToken: {{ include "batlehub.automountServiceAccountToken" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: config
          {{- if $configEntry.name }}
          {{- if eq $configEntry.kind "ConfigMap" }}
          configMap:
            name: {{ $configEntry.name }}
            {{- with $configEntry.mount.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- else }}
          secret:
            secretName: {{ $configEntry.name }}
            {{- with $configEntry.mount.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- else }}
          secret:
            secretName: {{ include "batlehub.fullname" . }}-config
            items:
              - key: config.toml
                path: config.toml
          {{- end }}
        {{- if and .Values.persistence.enabled (eq .Values.config.storage.type "filesystem") }}
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-cache" (include "batlehub.fullname" .)) }}
        {{- end }}
        {{- range .Values.externalManifest }}
        {{- if and (eq (include "batlehub.manifestEnabled" .) "true") .mount (not .mount.asConfig) }}
        - name: extra-{{ .name }}
          {{- if eq .kind "ConfigMap" }}
          configMap:
            name: {{ .name }}
            {{- with .mount.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- else }}
          secret:
            secretName: {{ .name }}
            {{- with .mount.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- end }}
        {{- end }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/batlehub/config.toml
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/batlehub
              readOnly: true
            {{- if and .Values.persistence.enabled (eq .Values.config.storage.type "filesystem") }}
            - name: cache
              mountPath: {{ .Values.config.storage.path }}
            {{- end }}
            {{- range .Values.externalManifest }}
            {{- if and (eq (include "batlehub.manifestEnabled" .) "true") .mount (not .mount.asConfig) }}
            - name: extra-{{ .name }}
              mountPath: {{ .mount.mountPath }}
              {{- with .mount.subPath }}
              subPath: {{ . }}
              {{- end }}
              readOnly: {{ if hasKey .mount "readOnly" }}{{ .mount.readOnly }}{{ else }}true{{ end }}
            {{- end }}
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
