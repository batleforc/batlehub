schemaVersion: 2.3.0
metadata:
  name: compose-conversion
parent:
  uri: https://raw.githubusercontent.com/batleforc/WeeboDevImage/refs/heads/main/che-min-mise/devfile.yaml
  components:
    - name: tools
      container:
        memoryLimit: 10Gi
        endpoints:
        - name: front
          targetPort: 5173
          exposure: public
          protocol: https
          secure: true
        - name: back
          targetPort: 8080
          exposure: public
          protocol: https
          secure: true

components:
  - name: postgres
    container:
      image: postgres:17-alpine
      env:
        - name: POSTGRES_DB
          value: batlehub
        - name: POSTGRES_PASSWORD
          value: changeme
        - name: POSTGRES_USER
          value: batlehub
        - name: PGDATA
          value: /data/pgdata
      endpoints:
        - name: port-5432
          targetPort: 5432
          exposure: public
      volumeMounts:
        - name: postgres-data
          path: /data/
      mountSources: true
  - name: postgres-data
    volume:
      size: 10Gi
