[package]
name = "proxy-cache-adapters"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["auth-token", "auth-oidc", "auth-kubernetes", "storage-fs", "registry-github", "registry-npm", "registry-cargo", "registry-openvsx", "registry-goproxy", "db-postgres"]
auth-token = []
auth-oidc = ["dep:jsonwebtoken"]
auth-kubernetes = []
storage-fs = []
storage-s3 = ["dep:aws-sdk-s3", "dep:aws-config"]
registry-github = []
registry-cargo = []
registry-npm = []
registry-openvsx = []
registry-goproxy = []
registry-pypi = []
registry-composer = []
db-postgres = []

[dependencies]
proxy-cache-core = { path = "../core" }
proxy-cache-config = { path = "../config" }
async-trait.workspace = true
anyhow.workspace = true
thiserror.workspace = true
chrono.workspace = true
uuid.workspace = true
bytes.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
reqwest.workspace = true
sqlx.workspace = true
tracing.workspace = true
jsonwebtoken = { version = "9", optional = true }
aws-sdk-s3 = { workspace = true, optional = true }
aws-config = { workspace = true, optional = true }
base64 = "0.22"
sha2 = "0.10"
rand = "0.8"
hex = "0.4"

[dev-dependencies]
mockito = "1"
rcgen = "0.13"
rustls = { version = "0.23", features = ["aws-lc-rs"] }
tokio-rustls = "0.26"
