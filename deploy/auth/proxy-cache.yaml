# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
---
version: 1
metadata:
  name: proxy-auth
entries:
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Provider authorization flow (implicit consent)
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Provider invalidation flow
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: System - OAuth2 Provider - Scopes
      required: true

  # Scope mapping that injects the user's group names as a "groups" JWT claim.
  - id: groups-scope
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: proxy-cache groups
    attrs:
      name: proxy-cache groups
      scope_name: groups
      expression: |
        return {"groups": [group.name for group in request.user.ak_groups.all()]}

  - id: provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: proxy-auth
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: proxy-auth
      client_secret: proxy-auth-secret
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:8080/api/v1/auth/oidc/callback
          redirect_uri_type: authorization
      grant_types:
        - authorization_code
        - refresh_token
        - client_credentials
        - password
      property_mappings:
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'openid'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'profile'"],
          ]
        - !Find [
            authentik_core.propertymapping,
            [name, "authentik default OAuth Mapping: OpenID 'email'"],
          ]
        - !KeyOf groups-scope
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, authentik Self-signed Certificate],
        ]

  - id: application
    model: authentik_core.application
    identifiers:
      slug: proxy-auth
    attrs:
      name: ProxyAuth
      provider: !KeyOf provider
