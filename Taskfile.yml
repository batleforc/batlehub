version: "3"

includes:
  cde: .task/cde.yaml

tasks:
  init:
    desc: Init project
    cmds:
      - mise upgrade
      - git remote set-url origin --add --push https://git.batleforc.fr/batleforc/batlehub
      - git remote set-url origin --add --push https://github.com/batleforc/batlehub

  # ── Rust ─────────────────────────────────────────────────────────────────────
  build:
    desc: Build the entire workspace
    cmds:
      - cargo build --workspace

  check:
    desc: Type-check the entire workspace without building
    cmds:
      - cargo check --workspace

  test:
    desc: Run all workspace tests
    cmds:
      - cargo test --workspace

  test:pg-cache:
    desc: Run PgCacheStore integration tests (starts a temporary Postgres container via Podman)
    vars:
      PG_CONTAINER: batlehub-test-pg
      PG_PORT: "15432"
      PG_PASSWORD: testpass
      CONF_OVERRIDE: /tmp/batlehub-containers.conf
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - cargo test -p batlehub-adapters --test pg_cache -- --nocapture

  test:pg-local-registry:
    desc: Run PostgresLocalRegistry integration tests (starts a temporary Postgres container via Podman)
    vars:
      PG_CONTAINER: batlehub-test-pg-local
      PG_PORT: "15433"
      PG_PASSWORD: testpass
      CONF_OVERRIDE: /tmp/batlehub-containers.conf
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - cargo test -p batlehub-adapters --test local_registry -- --nocapture

  test:s3:
    desc: Run S3 storage integration tests (starts a temporary MinIO container via Podman)
    vars:
      MINIO_CONTAINER: batlehub-test-minio
      MINIO_PORT: "19000"
      CONF_OVERRIDE: /tmp/batlehub-containers.conf
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      S3_TEST_ENDPOINT: "http://127.0.0.1:{{.MINIO_PORT}}"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.MINIO_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.MINIO_CONTAINER}} -p {{.MINIO_PORT}}:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data
      - until curl -sf http://127.0.0.1:{{.MINIO_PORT}}/minio/health/live; do sleep 1; done
      - cargo test -p batlehub-adapters --features storage-s3 --test s3_storage -- --nocapture

  coverage:
    desc: Generate HTML coverage report — starts Postgres and MinIO to include all integration tests
    vars:
      PG_CONTAINER: batlehub-cov-pg
      PG_PORT: "25432"
      PG_PASSWORD: covpass
      MINIO_CONTAINER: batlehub-cov-minio
      MINIO_PORT: "29000"
      CONF_OVERRIDE: /tmp/batlehub-cov-containers.conf
      COVERAGE_EXCLUDE: "server/src/main\\.rs|crates/web/src/handlers/auth/oidc\\.rs|crates/web/src/handlers/back_office/health\\.rs|crates/adapters/src/db/|crates/adapters/src/registry/(cargo|github|npm)\\.rs"
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
      S3_TEST_ENDPOINT: "http://127.0.0.1:{{.MINIO_PORT}}"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} {{.MINIO_CONTAINER}} 2>/dev/null || true
      - podman run -d --user postgres --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - podman run -d --name {{.MINIO_CONTAINER}} -p {{.MINIO_PORT}}:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - until curl -sf http://127.0.0.1:{{.MINIO_PORT}}/minio/health/live; do sleep 1; done
      - cargo llvm-cov clean --workspace
      - cargo llvm-cov --no-report --workspace --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"
      - cargo llvm-cov --no-report -p batlehub-adapters --test pg_cache
      - cargo llvm-cov --no-report -p batlehub-adapters --test local_registry
      - cargo llvm-cov --no-report -p batlehub-adapters --test storage_router
      - cargo llvm-cov --no-report -p batlehub-adapters --features storage-s3 --test s3_storage
      - cargo llvm-cov report --html --output-dir coverage/html --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"

  coverage-check:
    desc: Fail if line coverage is below 80% — starts Postgres and MinIO to include all integration tests
    vars:
      PG_CONTAINER: batlehub-cov-pg
      PG_PORT: "25432"
      PG_PASSWORD: covpass
      MINIO_CONTAINER: batlehub-cov-minio
      MINIO_PORT: "29000"
      CONF_OVERRIDE: /tmp/batlehub-cov-containers.conf
      COVERAGE_EXCLUDE: "server/src/main\\.rs|crates/web/src/handlers/auth/oidc\\.rs|crates/web/src/handlers/back_office/health\\.rs|crates/adapters/src/db/|crates/adapters/src/registry/(cargo|github|npm)\\.rs"
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
      S3_TEST_ENDPOINT: "http://127.0.0.1:{{.MINIO_PORT}}"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} {{.MINIO_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - podman run -d --name {{.MINIO_CONTAINER}} -p {{.MINIO_PORT}}:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - until curl -sf http://127.0.0.1:{{.MINIO_PORT}}/minio/health/live; do sleep 1; done
      - cargo llvm-cov clean --workspace
      - cargo llvm-cov --no-report --workspace --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"
      - cargo llvm-cov --no-report -p batlehub-adapters --test pg_cache
      - cargo llvm-cov --no-report -p batlehub-adapters --test local_registry
      - cargo llvm-cov --no-report -p batlehub-adapters --test storage_router
      - cargo llvm-cov --no-report -p batlehub-adapters --features storage-s3 --test s3_storage
      - cargo llvm-cov report --fail-under-lines 80 --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"

  fuzz:
    desc: "Run a fuzz target for up to MAX_TIME seconds (default: 30). Set TARGET to pick one: fuzz_rbac_evaluate | fuzz_package_id_cache_key | fuzz_deny_latest | fuzz_release_age"
    dir: fuzz
    vars:
      TARGET: '{{.TARGET | default "fuzz_deny_latest"}}'
      MAX_TIME: '{{.MAX_TIME | default "30"}}'
    cmds:
      - cargo +nightly fuzz run {{.TARGET}} -- -max_total_time={{.MAX_TIME}}

  lint:
    desc: Run clippy lints across the workspace
    cmds:
      - cargo clippy --workspace -- -D warnings

  audit:
    desc: Check dependencies for security vulnerabilities (non-actionable advisories suppressed via .cargo/audit.toml)
    cmds:
      - cargo audit

  fmt:
    desc: Format all Rust source files
    cmds:
      - cargo fmt --all

  run:
    desc: Start the server with the example config (requires postgres)
    cmds:
      - cargo run -p batlehub-server -- --config config.example.toml

  run:s3:
    desc: Start the server with the S3 config (requires compose:s3:db; set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY first)
    env:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
    cmds:
      - cargo run -p batlehub-server --features storage-s3 -- --config config.example-s3.toml

  dump-spec:
    desc: Dump the OpenAPI spec to ui/openapi.json
    cmds:
      - cargo run -p batlehub-server -- --config config.example.toml dump-spec > ui/openapi.json

  # ── Frontend ──────────────────────────────────────────────────────────────────

  ui:install:
    desc: Install frontend npm dependencies
    dir: ui
    cmds:
      - npm install

  ui:generate:
    desc: Generate TypeScript client from the OpenAPI spec (run dump-spec first)
    dir: ui
    cmds:
      - npm run generate

  ui:dev:
    desc: Start the Vite dev server (proxies /api and /proxy to localhost:8080)
    dir: ui
    cmds:
      - npm run dev

  ui:build:
    desc: Build the frontend SPA for production
    dir: ui
    cmds:
      - npm run build

  ui:lint:
    desc: Run the frontend ESLint check locally
    dir: ui
    cmds:
      - |
        npm install --no-save \
          eslint@9 \
          @eslint/js@9 \
          eslint-plugin-vue@9 \
          vue-eslint-parser@10 \
          @typescript-eslint/parser@8 \
          @typescript-eslint/eslint-plugin@8 \
          @microsoft/eslint-formatter-sarif@3
      - npx eslint src --ext .ts,.vue --format @microsoft/eslint-formatter-sarif -o eslint-results.sarif

  dev:
    desc: Start Rust backend and Vite frontend in parallel (requires postgres)
    deps:
      - task: run
      - task: ui:dev

  dev:s3:
    desc: Start Rust backend (S3 config) and Vite frontend in parallel (requires compose:s3:db)
    deps:
      - task: run:s3
      - task: ui:dev

  # ── Podman Compose ────────────────────────────────────────────────────────────

  compose:up:
    desc: Start postgres + server via Podman Compose
    cmds:
      - podman compose up -d

  compose:auth:
    desc: Start the optional Authentik OIDC provider (requires compose:up)
    cmds:
      - podman compose --profile authentik up -d authentik-postgres
      - podman compose --profile authentik up -d authentik-redis
      - podman compose --profile authentik up -d authentik-server
      - podman compose --profile authentik up -d authentik-worker

  compose:auth:pwd:
    desc: "Set admin password for the Authentik identity provider (default: akadmin)"
    cmds:
      - podman compose exec -T authentik-server ak shell -c "from authentik.core.models import User; u=User.objects.get(username='akadmin'); u.set_password('akadmin'); u.save(); print('password reset for', u.username)"

  compose:down:
    desc: Stop and remove compose containers
    cmds:
      - podman compose down

  compose:logs:
    desc: Tail server logs
    cmds:
      - podman compose logs -f server

  compose:db:
    desc: Start only postgres (for local cargo run)
    cmds:
      - podman compose up -d postgres

  compose:build:
    desc: (Re)build the server image
    cmds:
      - podman compose build

  compose:otel:
    desc: Start all services including Jaeger
    cmds:
      - podman compose --profile otel up -d

  # ── S3 / RustFS ───────────────────────────────────────────────────────────────

  compose:s3:up:
    desc: Start the full S3 stack (postgres + RustFS + Authentik + Jaeger + server) via docker-compose.s3.yml
    cmds:
      - podman compose -f docker-compose.s3.yml up postgres -d
      - podman compose -f docker-compose.s3.yml up authentik-postgres -d
      - podman compose -f docker-compose.s3.yml up rustfs -d
      - podman compose -f docker-compose.s3.yml up authentik-redis -d
      - podman compose -f docker-compose.s3.yml up authentik-server -d
      - podman compose -f docker-compose.s3.yml up authentik-worker -d
      - podman compose -f docker-compose.s3.yml up jaeger -d

  compose:s3:db:
    desc: Start infrastructure only (postgres, RustFS, Authentik, Jaeger) for local cargo run
    cmds:
      - podman compose -f docker-compose.s3.yml up -d postgres rustfs rustfs-init authentik-postgres authentik-redis authentik-server authentik-worker jaeger

  compose:s3:down:
    desc: Stop and remove the S3 stack containers
    cmds:
      - podman compose -f docker-compose.s3.yml down {{ .CLI_ARGS }}

  compose:s3:logs:
    desc: Tail server logs from the S3 stack
    cmds:
      - podman compose -f docker-compose.s3.yml logs -f server

  compose:s3:build:
    desc: (Re)build the server image for the S3 stack
    cmds:
      - podman compose -f docker-compose.s3.yml build

  compose:s3:auth:pwd:
    desc: "Set admin password for the Authentik identity provider (default: akadmin)"
    cmds:
      - podman compose exec -T authentik-server ak shell -c "from authentik.core.models import User; u=User.objects.get(username='akadmin'); u.set_password('akadmin'); u.save(); print('password reset for', u.username)"
  compose:s3:bucket:create:
    desc: Create the "artifacts" bucket in RustFS (requires compose:s3:db)
    cmds:
      - until curl -sf http://localhost:9900/health; do sleep 1; done
      - mc alias set local http://localhost:9900 rustfsadmin rustfsadmin
      - mc mb --ignore-existing local/artifacts

  # ── Docs website (VitePress) ──────────────────────────────────────────────────

  website:dev:
    desc: Start the VitePress documentation dev server
    dir: website
    cmds:
      - npm run docs:dev

  website:build:
    desc: Build the VitePress documentation site for production
    dir: website
    cmds:
      - npm run docs:build

  website:preview:
    desc: Preview the built VitePress documentation site
    dir: website
    cmds:
      - npm run docs:preview
