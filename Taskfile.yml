version: "3"

includes:
  cde: .task/cde.yaml

tasks:
  init:
    desc: Init project
    cmds:
      - mise upgrade
      - git remote set-url origin --add --push https://git.batleforc.fr/batleforc/batlehub
      - git remote set-url origin --add --push https://github.com/batleforc/batlehub

  # ── Rust ─────────────────────────────────────────────────────────────────────
  build:
    desc: Build the entire workspace
    cmds:
      - cargo build --workspace

  check:
    desc: Type-check the entire workspace without building
    cmds:
      - cargo check --workspace

  test:
    desc: Run all workspace tests
    cmds:
      - cargo test --workspace

  test:all:
    desc: Run backend and frontend test suites in parallel
    deps:
      - task: test
      - task: ui:test

  test:pg-cache:
    desc: Run PgCacheStore integration tests (starts a temporary Postgres container via Podman)
    vars:
      PG_CONTAINER: batlehub-test-pg
      PG_PORT: "15432"
      PG_PASSWORD: testpass
      CONF_OVERRIDE: /tmp/batlehub-containers.conf
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - cargo test -p batlehub-adapters --test pg_cache -- --nocapture

  test:pg-local-registry:
    desc: Run PostgresLocalRegistry integration tests (starts a temporary Postgres container via Podman)
    vars:
      PG_CONTAINER: batlehub-test-pg-local
      PG_PORT: "15433"
      PG_PASSWORD: testpass
      CONF_OVERRIDE: /tmp/batlehub-containers.conf
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - cargo test -p batlehub-adapters --test local_registry -- --nocapture

  test:s3:
    desc: Run S3 storage integration tests (starts a temporary MinIO container via Podman)
    vars:
      MINIO_CONTAINER: batlehub-test-minio
      MINIO_PORT: "19000"
      CONF_OVERRIDE: /tmp/batlehub-containers.conf
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      S3_TEST_ENDPOINT: "http://127.0.0.1:{{.MINIO_PORT}}"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.MINIO_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.MINIO_CONTAINER}} -p {{.MINIO_PORT}}:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data
      - until curl -sf http://127.0.0.1:{{.MINIO_PORT}}/minio/health/live; do sleep 1; done
      - cargo test -p batlehub-adapters --features storage-s3 --test s3_storage -- --nocapture

  coverage:
    desc: Generate an HTML coverage report and an lcov report for SonarQube — starts Postgres, MinIO and Redis to include all integration tests
    vars:
      PG_CONTAINER: batlehub-cov-pg
      PG_PORT: "25432"
      PG_PASSWORD: covpass
      MINIO_CONTAINER: batlehub-cov-minio
      MINIO_PORT: "29000"
      REDIS_CONTAINER: batlehub-cov-redis
      REDIS_PORT: "26379"
      CONF_OVERRIDE: /tmp/batlehub-cov-containers.conf
      COVERAGE_EXCLUDE: "server/src/main\\.rs|server/src/server_factory\\.rs|crates/web/src/handlers/auth/oidc\\.rs|crates/web/src/handlers/auth/oidc/sso\\.rs|crates/web/src/handlers/back_office/health/system\\.rs|crates/adapters/src/db/|crates/adapters/src/registry/(cargo|github|npm)\\.rs|crates/adapters/src/cache/(postgres|banner_redis)\\.rs|crates/adapters/src/local_registry/postgres\\.rs|crates/adapters/src/rate_limit/(postgres|ip_block_postgres)\\.rs|crates/adapters/src/storage/router\\.rs"
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
      S3_TEST_ENDPOINT: "http://127.0.0.1:{{.MINIO_PORT}}"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      REDIS_URL: "redis://127.0.0.1:{{.REDIS_PORT}}"
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} {{.MINIO_CONTAINER}} {{.REDIS_CONTAINER}} 2>/dev/null || true
      - podman run -d --user postgres --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - podman run -d --name {{.MINIO_CONTAINER}} -p {{.MINIO_PORT}}:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data
      - podman run -d --name {{.REDIS_CONTAINER}} -p {{.REDIS_PORT}}:6379 redis:7-alpine redis-server --save "" --appendonly no
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - until curl -sf http://127.0.0.1:{{.MINIO_PORT}}/minio/health/live; do sleep 1; done
      - until podman exec {{.REDIS_CONTAINER}} redis-cli ping 2>/dev/null | grep -q PONG; do sleep 1; done
      - cargo llvm-cov clean --workspace
      - cargo llvm-cov --no-report --workspace --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"
      - cargo llvm-cov --no-report -p batlehub-adapters --test pg_cache
      - cargo llvm-cov --no-report -p batlehub-adapters --test local_registry
      - cargo llvm-cov --no-report -p batlehub-adapters --test artifact_meta
      - cargo llvm-cov --no-report -p batlehub-adapters --test pg_rate_limit
      - cargo llvm-cov --no-report -p batlehub-adapters --test storage_router
      - cargo llvm-cov --no-report -p batlehub-adapters --features storage-s3 --test s3_storage
      - cargo llvm-cov --no-report -p batlehub-adapters --test actions_oidc
      - cargo llvm-cov --no-report -p batlehub-adapters --features cache-redis --test redis_cache
      - cargo llvm-cov --no-report -p batlehub-adapters --features cache-redis --test redis_rate_limit
      - cargo llvm-cov report --html --output-dir coverage/html --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"
      - cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"

  coverage-check:
    desc: Fail if line coverage is below 80% — starts Postgres, MinIO and Redis to include all integration tests
    vars:
      PG_CONTAINER: batlehub-cov-pg
      PG_PORT: "25432"
      PG_PASSWORD: covpass
      MINIO_CONTAINER: batlehub-cov-minio
      MINIO_PORT: "29000"
      REDIS_CONTAINER: batlehub-cov-redis
      REDIS_PORT: "26379"
      CONF_OVERRIDE: /tmp/batlehub-cov-containers.conf
      COVERAGE_EXCLUDE: "server/src/main\\.rs|server/src/server_factory\\.rs|crates/web/src/handlers/auth/oidc\\.rs|crates/web/src/handlers/auth/oidc/sso\\.rs|crates/web/src/handlers/back_office/health/system\\.rs|crates/adapters/src/db/|crates/adapters/src/registry/(cargo|github|npm)\\.rs|crates/adapters/src/cache/(postgres|banner_redis)\\.rs|crates/adapters/src/local_registry/postgres\\.rs|crates/adapters/src/rate_limit/(postgres|ip_block_postgres)\\.rs|crates/adapters/src/storage/router\\.rs"
    env:
      CONTAINERS_CONF_OVERRIDE: "{{.CONF_OVERRIDE}}"
      DATABASE_URL: "postgresql://postgres:{{.PG_PASSWORD}}@127.0.0.1:{{.PG_PORT}}/postgres"
      S3_TEST_ENDPOINT: "http://127.0.0.1:{{.MINIO_PORT}}"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      REDIS_URL: "redis://127.0.0.1:{{.REDIS_PORT}}"
    cmds:
      - printf '[network]\ndefault_rootless_network_cmd = "pasta"\n' > {{.CONF_OVERRIDE}}
      - defer: podman rm -f {{.PG_CONTAINER}} {{.MINIO_CONTAINER}} {{.REDIS_CONTAINER}} 2>/dev/null || true
      - podman run -d --name {{.PG_CONTAINER}} -p {{.PG_PORT}}:5432 -e POSTGRES_PASSWORD={{.PG_PASSWORD}} postgres:17-alpine
      - podman run -d --name {{.MINIO_CONTAINER}} -p {{.MINIO_PORT}}:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data
      - podman run -d --name {{.REDIS_CONTAINER}} -p {{.REDIS_PORT}}:6379 redis:7-alpine redis-server --save "" --appendonly no
      - until podman exec {{.PG_CONTAINER}} pg_isready -U postgres; do sleep 1; done
      - until curl -sf http://127.0.0.1:{{.MINIO_PORT}}/minio/health/live; do sleep 1; done
      - until podman exec {{.REDIS_CONTAINER}} redis-cli ping 2>/dev/null | grep -q PONG; do sleep 1; done
      - cargo llvm-cov clean --workspace
      - cargo llvm-cov --no-report --workspace --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"
      - cargo llvm-cov --no-report -p batlehub-adapters --test pg_cache
      - cargo llvm-cov --no-report -p batlehub-adapters --test local_registry
      - cargo llvm-cov --no-report -p batlehub-adapters --test artifact_meta
      - cargo llvm-cov --no-report -p batlehub-adapters --test pg_rate_limit
      - cargo llvm-cov --no-report -p batlehub-adapters --test storage_router
      - cargo llvm-cov --no-report -p batlehub-adapters --features storage-s3 --test s3_storage
      - cargo llvm-cov --no-report -p batlehub-adapters --test actions_oidc
      - cargo llvm-cov --no-report -p batlehub-adapters --features cache-redis --test redis_cache
      - cargo llvm-cov --no-report -p batlehub-adapters --features cache-redis --test redis_rate_limit
      - cargo llvm-cov report --fail-under-lines 80 --ignore-filename-regex "{{.COVERAGE_EXCLUDE}}"

  fuzz:
    desc: "Run a fuzz target for up to MAX_TIME seconds (default: 30). Set TARGET to pick one: fuzz_rbac_evaluate | fuzz_package_id_cache_key | fuzz_deny_latest | fuzz_release_age"
    dir: fuzz
    vars:
      TARGET: '{{.TARGET | default "fuzz_deny_latest"}}'
      MAX_TIME: '{{.MAX_TIME | default "30"}}'
    cmds:
      - cargo +nightly fuzz run {{.TARGET}} -- -max_total_time={{.MAX_TIME}}

  lint:
    desc: Run clippy lints across the workspace
    cmds:
      - cargo clippy --workspace -- -D warnings
      - cargo fmt --all --check

  audit:
    desc: Check Rust dependencies for security vulnerabilities (non-actionable advisories suppressed via .cargo/audit.toml)
    cmds:
      - cargo audit

  ui:audit:
    desc: Check frontend npm dependencies for security vulnerabilities
    dir: ui
    cmds:
      - npm audit

  fmt:
    desc: Format all Rust source files
    cmds:
      - cargo fmt --all

  release:prepare:
    desc: "Prepare a release — bumps versions, cuts the changelog, commits and tags locally (does not push). Pass args after --, e.g. task release:prepare -- 0.2.0 or task release:prepare -- --minor --dry-run"
    cmds:
      - bash scripts/prepare-release.sh {{.CLI_ARGS}}

  run:
    desc: Start the server with the example config (requires postgres)
    cmds:
      - cargo run -p batlehub-server -- --config config.example.toml

  run:s3:
    desc: Start the server with the S3 config (requires compose:s3:db; set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY first)
    env:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
    cmds:
      - cargo run -p batlehub-server --features storage-s3 -- --config config.example-s3.toml

  cli:
    desc: "Run batlehub-cli with any arguments (e.g. task cli -- registry list)"
    cmds:
      - cargo run -p batlehub-cli -- {{.CLI_ARGS}}

  cli:tui:
    desc: Launch the batlehub-cli interactive TUI
    cmds:
      - cargo run -p batlehub-cli -- tui

  cli:help:
    desc: Print batlehub-cli help
    cmds:
      - cargo run -p batlehub-cli -- --help

  dump-spec:
    desc: Dump the OpenAPI spec to ui/openapi.json
    cmds:
      - cargo run -p batlehub-server -- --config config.example.toml dump-spec > ui/openapi.json

  # ── Frontend ──────────────────────────────────────────────────────────────────

  ui:install:
    desc: Install frontend npm dependencies
    dir: ui
    cmds:
      - npm install

  ui:generate:
    desc: Generate TypeScript client from the OpenAPI spec (run dump-spec first)
    dir: ui
    cmds:
      - npm run generate

  ui:dev:
    desc: Start the Vite dev server (proxies /api and /proxy to localhost:8080)
    dir: ui
    cmds:
      - npm run dev

  ui:build:
    desc: Build the frontend SPA for production
    dir: ui
    cmds:
      - npm run build

  ui:lint:
    desc: Run the frontend oxlint, eslint and oxfmt checks locally
    dir: ui
    cmds:
      - npm run lint
      - npm run lint:eslint
      - npm run format:check

  ui:test:
    desc: Run the frontend test suite
    dir: ui
    cmds:
      - npm run test

  ui:coverage:
    desc: Run the frontend test suite with coverage (enforces threshold)
    dir: ui
    cmds:
      - npm run coverage

  ui:fix:
    desc: Auto-fix oxlint issues and format the frontend source with oxfmt
    dir: ui
    cmds:
      - npm run lint:fix
      - npm run format

  dev:
    desc: Start Rust backend and Vite frontend in parallel (requires postgres)
    deps:
      - task: run
      - task: ui:dev

  dev:s3:
    desc: Start Rust backend (S3 config) and Vite frontend in parallel (requires compose:s3:db)
    deps:
      - task: run:s3
      - task: ui:dev

  # ── Podman Compose ────────────────────────────────────────────────────────────

  compose:up:
    desc: Start postgres + server via Podman Compose
    cmds:
      - podman compose up -d

  compose:auth:
    desc: Start the optional Authentik OIDC provider (requires compose:up)
    cmds:
      - podman compose --profile authentik up -d authentik-postgres
      - podman compose --profile authentik up -d authentik-redis
      - podman compose --profile authentik up -d authentik-server
      - podman compose --profile authentik up -d authentik-worker

  compose:auth:pwd:
    desc: "Set admin password for the Authentik identity provider (default: akadmin)"
    cmds:
      - podman compose exec -T authentik-server ak shell -c "from authentik.core.models import User; u=User.objects.get(username='akadmin'); u.set_password('akadmin'); u.save(); print('password reset for', u.username)"

  compose:down:
    desc: Stop and remove compose containers
    cmds:
      - podman compose down

  compose:logs:
    desc: Tail server logs
    cmds:
      - podman compose logs -f server

  compose:db:
    desc: Start only postgres (for local cargo run)
    cmds:
      - podman compose up -d postgres

  compose:build:
    desc: (Re)build the server image
    cmds:
      - podman compose build

  compose:otel:
    desc: Start all services including Jaeger
    cmds:
      - podman compose --profile otel up -d

  # ── S3 / RustFS ───────────────────────────────────────────────────────────────

  compose:s3:up:
    desc: Start the full S3 stack (postgres + RustFS + Authentik + Jaeger + server) via docker-compose.s3.yml
    cmds:
      - podman compose -f docker-compose.s3.yml up postgres -d
      - podman compose -f docker-compose.s3.yml up authentik-postgres -d
      - podman compose -f docker-compose.s3.yml up rustfs -d
      - podman compose -f docker-compose.s3.yml up authentik-redis -d
      - podman compose -f docker-compose.s3.yml up authentik-server -d
      - podman compose -f docker-compose.s3.yml up authentik-worker -d
      - podman compose -f docker-compose.s3.yml up jaeger -d

  compose:s3:db:
    desc: Start infrastructure only (postgres, RustFS, Authentik, Jaeger) for local cargo run
    cmds:
      - podman compose -f docker-compose.s3.yml up -d postgres rustfs rustfs-init authentik-postgres authentik-redis authentik-server authentik-worker jaeger

  compose:s3:down:
    desc: Stop and remove the S3 stack containers
    cmds:
      - podman compose -f docker-compose.s3.yml down {{ .CLI_ARGS }}

  compose:s3:logs:
    desc: Tail server logs from the S3 stack
    cmds:
      - podman compose -f docker-compose.s3.yml logs -f server

  compose:s3:build:
    desc: (Re)build the server image for the S3 stack
    cmds:
      - podman compose -f docker-compose.s3.yml build

  compose:s3:auth:pwd:
    desc: "Set admin password for the Authentik identity provider (default: akadmin)"
    cmds:
      - podman compose exec -T authentik-server ak shell -c "from authentik.core.models import User; u=User.objects.get(username='akadmin'); u.set_password('akadmin'); u.save(); print('password reset for', u.username)"
  compose:s3:bucket:create:
    desc: Create the "artifacts" bucket in RustFS (requires compose:s3:db)
    cmds:
      - until curl -sf http://localhost:9900/health; do sleep 1; done
      - mc alias set local http://localhost:9900 rustfsadmin rustfsadmin
      - mc mb --ignore-existing local/artifacts

  # ── Docs website (VitePress) ──────────────────────────────────────────────────

  website:dev:
    desc: Start the VitePress documentation dev server
    dir: website
    cmds:
      - npm run docs:dev

  website:build:
    desc: Build the VitePress documentation site for production
    dir: website
    cmds:
      - npm run docs:build

  website:preview:
    desc: Preview the built VitePress documentation site
    dir: website
    cmds:
      - npm run docs:preview

  # ── Performance testing ───────────────────────────────────────────────────────

  perf:infra:up:
    desc: Start Prometheus + Grafana monitoring stack (http://localhost:3000, admin/admin)
    cmds:
      - podman compose -f perf/docker-compose.monitoring.yml up -d

  perf:infra:down:
    desc: Stop Prometheus + Grafana monitoring stack
    cmds:
      - podman compose -f perf/docker-compose.monitoring.yml down

  perf:upstream:
    desc: "Start mock upstream registry on :9999 (simulate npm/cargo upstreams)"
    dir: perf/mock-upstream
    cmds:
      - cargo run --release -- --port 9999 --delay-ms {{.DELAY_MS | default "0"}} --artifact-size-kb {{.ARTIFACT_KB | default "512"}}

  perf:server:
    desc: Run BatleHub with the perf config (requires compose:db and perf:upstream)
    env:
      BATLEHUB_CONFIG: perf/config.perf.toml
    cmds:
      - cargo run -p batlehub-server --release

  perf:seed:
    desc: Warm the artifact cache with seed data (requires perf:server and perf:upstream)
    cmds:
      - bash perf/scripts/seed.sh {{.BASE_URL | default "http://localhost:8080"}}

  perf:run:rest:
    desc: "k6 scenario 01 — at-rest baseline (60 s, 1 VU) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/01_at_rest.js

  perf:run:read:
    desc: "k6 scenario 02 — warm-cache read load (ramp to 200 VU ≈ 2k req/s) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/02_warm_read.js

  perf:run:miss:
    desc: "k6 scenario 03 — cache-miss / proxy-through load (20 VU, 120 s) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/03_cache_miss.js

  perf:run:upload:
    desc: "k6 scenario 04 — artifact upload/publish load (10 VU, 60 s) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/04_upload.js {{.CLI_ARGS}}

  perf:run:mixed:
    desc: "k6 scenario 05 — realistic mixed workload (80% read / 15% miss / 5% upload, 10 min) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/05_mixed.js

  perf:run:sbom:
    desc: "k6 scenario 06 — SBOM read + org export load (60 s) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/06_sbom.js

  perf:run:eviction:
    desc: "k6 scenario 07 — cache eviction sweep under concurrent cache growth (60 s) + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/07_eviction.js

  perf:run:all:
    desc: Run the full perf suite in sequence (scenarios 01-07); threshold violations are reported but do not stop the suite
    cmds:
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/01_at_rest.js
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/02_warm_read.js
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/03_cache_miss.js
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/04_upload.js
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/05_mixed.js
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/06_sbom.js
      - bash perf/scripts/run_with_metrics.sh --no-thresholds perf/k6/scenarios/07_eviction.js

  # ── Performance testing — S3 + Redis backends ─────────────────────────────────
  # Same k6 scenarios as the filesystem/memory suite; only the server config
  # differs.  Run both suites back-to-back to compare backends head-to-head.

  perf:s3:infra:up:
    desc: Start MinIO (S3, :9200) + Redis (:6380) and create the perf-artifacts bucket
    cmds:
      - podman compose -f perf/docker-compose.perf-s3.yml up -d perf-minio
      - until curl -sf http://localhost:9200/minio/health/live; do sleep 1; done
      - mc alias set perf-minio http://localhost:9200 minioadmin minioadmin
      - mc mb --ignore-existing perf-minio/perf-artifacts
      - podman compose -f perf/docker-compose.perf-s3.yml up -d perf-redis

  perf:s3:infra:down:
    desc: Stop MinIO and Redis perf containers
    cmds:
      - podman compose -f perf/docker-compose.perf-s3.yml down

  perf:s3:server:
    desc: Run BatleHub with the S3 + Redis perf config (requires compose:db and perf:s3:infra:up)
    env:
      BATLEHUB_CONFIG: perf/config.perf-s3.toml
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    cmds:
      - cargo run -p batlehub-server --release --features storage-s3

  perf:s3:run:rest:
    desc: "k6 scenario 01 — at-rest baseline against S3+Redis server + RAM/CPU summary"
    cmds:
      - bash perf/scripts/run_with_metrics.sh perf/k6/scenarios/01_at_rest.js

  perf:s3:run:read:
