# BatleHub performance-test configuration — S3 + Redis backends.
#
# Identical registries to config.perf.toml; only the storage and cache
# backends differ so results are directly comparable.
#
# Start the server with:
#   task perf:s3:server
# (sets AWS credentials and BATLEHUB_CONFIG automatically)

[server]
host = "0.0.0.0"
port = 8080

[database]
type = "postgresql"
url = "postgresql://batlehub:changeme@localhost:5432/batlehub"
max_connections = 50

# ── S3 storage (MinIO started by task perf:s3:infra:up) ──────────────────────
# AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are injected by perf:s3:server.

[storage]
type = "s3"
bucket = "perf-artifacts"
region = "us-east-1"
endpoint_url = "http://localhost:9200"
force_path_style = true

# ── Redis metadata cache (started by task perf:s3:infra:up) ──────────────────

[cache]
type = "redis"
url = "redis://localhost:6380"

# ── Token auth ────────────────────────────────────────────────────────────────

[[auth]]
type = "token"

[[auth.tokens]]
value = "perf-admin-token"
role = "admin"
user_id = "perf-admin"

[[auth.tokens]]
value = "perf-user-token"
role = "user"
user_id = "perf-user"

# ── Proxy npm registry (upstream = mock server) ───────────────────────────────

[[registries]]
type = "npm"
name = "perf-npm"
upstreams = ["http://localhost:9999/npm"]

[registries.rbac]
anonymous = []
user = ["releases:read", "source:read"]
admin = ["*"]

# Eviction config for scenario 07 (POST /api/v1/admin/registries/perf-npm/evict).
[registries.cache]
artifact_ttl_secs = 3600
keep_latest_n = 3

[registries.sbom]
enabled = true
formats = ["spdx", "cyclonedx"]
fetch_upstream = false

# ── Local npm registry ────────────────────────────────────────────────────────

[[registries]]
type = "npm"
name = "perf-local-npm"
mode = "local"

[registries.rbac]
anonymous = []
user = ["releases:read", "source:read", "packages:publish"]
admin = ["*"]

[registries.quota]
max_storage_bytes_per_user = 10_737_418_240
max_packages_per_user = 100_000
enforcement = "warn"

[registries.sbom]
enabled = true
formats = ["spdx", "cyclonedx"]
fetch_upstream = false
