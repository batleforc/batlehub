name: Upgrade docker

scms:
  default:
    kind: gitea
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner}}"
      repository: "{{ .github.repository}}"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      url: "https://git.batleforc.fr"
      branch: main

actions:
  default:
    kind: gitea/pullrequest
    scmid: default
    spec:
      title: "ci: Upgrade Containerfile"
      automerge: false
      description: |
        Upgrade `docker` version in `Containerfile` to the latest version.
      labels:
        - "Upgrade"
        - "UpdateCLI"

autodiscovery:
  scmid: default
  actionid: default
  crawlers:
    dockerfile:
      filematch:
        - "Containerfile"
        - "Containerfile.hardened"
