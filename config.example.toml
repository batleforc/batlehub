# batlehub — example configuration
# Copy this file to config.toml and edit as needed.

[server]
host = "0.0.0.0"
port = 8080
# Serve the built SPA from this directory (optional).
# static_dir = "./ui/dist"
# Restrict CORS to specific frontend origins in production.
# When absent, all origins are allowed (fine for local dev).
# cors_allowed_origins = ["https://batlehub.example.com"]

[database]
type = "postgresql"
url = "postgresql://batlehub:changeme@localhost:5432/batlehub"
max_connections = 10

# ── Auth providers (evaluated in order; first match wins) ─────────────────────

[[auth]]
type = "token"

[[auth.tokens]]
value = "change-me-admin-token"
role = "admin"
user_id = "admin"

[[auth.tokens]]
value = "change-me-user-token"
role = "user"
user_id = "user-1"

# Unauthenticated requests automatically receive the "anonymous" role.

# OIDC provider — JWT validation + browser SSO login.
# Works with any standards-compliant provider (Authentik, Keycloak, Dex, …).
#
# Local Authentik (docker compose --profile authentik up):
[[auth]]
type = "oidc"
issuer_url = "http://localhost:9000/application/o/proxy-auth/"
client_id = "proxy-auth"
client_secret = "proxy-auth-secret"                              # from Authentik app settings
redirect_uri = "http://localhost:8080/api/v1/auth/oidc/callback"
scopes = ["openid", "profile", "email", "groups"]
# Where to redirect after the OIDC callback. Defaults to "" (same origin as the
# backend). Set this when running the Vite dev server separately.
frontend_url = "http://localhost:5173"

# JWT claim used as the user's identifier (default: "sub").
# "preferred_username" gives a human-readable name (e.g. "akadmin") instead of a UUID.
user_id_claim = "preferred_username"

# JWT claim inspected for role mapping (default: "role").
# The value may be a string or an array of strings; the highest matching role wins.
role_claim = "groups"

# Map Authentik group names (JWT claim values) → proxy roles.
# Keys are group names as they appear in the "groups" JWT claim.
[auth.role_mappings]
"authentik Admins" = "admin"
"proxy-users" = "user"

[[auth]]
name = "oidc2"
type = "oidc"
issuer_url = "http://localhost:9000/application/o/proxy-auth/"
client_id = "proxy-auth"
client_secret = "proxy-auth-secret"                               # from Authentik app settings
redirect_uri = "http://localhost:8080/api/v1/auth/oidc2/callback"
scopes = ["openid", "profile", "email", "groups"]
# Where to redirect after the OIDC callback. Defaults to "" (same origin as the
# backend). Set this when running the Vite dev server separately.
frontend_url = "http://localhost:5173"

# JWT claim used as the user's identifier (default: "sub").
# "preferred_username" gives a human-readable name (e.g. "akadmin") instead of a UUID.
user_id_claim = "preferred_username"

# JWT claim inspected for role mapping (default: "role").
# The value may be a string or an array of strings; the highest matching role wins.
role_claim = "groups"

# Map Authentik group names (JWT claim values) → proxy roles.
# Keys are group names as they appear in the "groups" JWT claim.
[auth.role_mappings]
"authentik Admins" = "admin"
"proxy-users" = "user"

# Kubernetes service account token provider (in-cluster use).
# Validates Bearer tokens via the Kubernetes TokenReview API.
#
# [[auth]]
# type = "kubernetes"
#
# # Defaults come from the standard in-cluster mounted secrets and env vars.
# # api_server   = "https://kubernetes.default.svc"
# # ca_cert_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
# # token_path   = "/var/run/secrets/kubernetes.io/serviceaccount/token"
#
# # Audiences passed to the TokenReview API (defaults to ["batlehub"]).
# audiences = ["batlehub"]
#
# # Map Kubernetes usernames or group names to proxy roles.
# # Kubernetes sets:
# #   username: "system:serviceaccount:<namespace>:<name>"
# #   groups:   ["system:serviceaccounts", "system:serviceaccounts:<namespace>", ...]
# # The highest matching role wins when multiple keys match.
# [auth.role_mappings]
# "system:serviceaccount:prod:ci-deployer"  = "admin"
# "system:serviceaccounts:dev"              = "user"
# "system:serviceaccounts"                  = "anonymous"

# ── Storage backend ────────────────────────────────────────────────────────────

# Single backend (legacy format — still supported):
[storage]
type = "filesystem"
path = "./tmp/storage-cache"

# Multi-backend example with RustFS (S3-compatible):
# [storage]
# default = "primary"
#
# [[storage.backends]]
# name = "primary"
# type = "filesystem"
# path = "./tmp/storage-cache"
#
# [[storage.backends]]
# name = "rustfs"
# type = "s3"
# bucket = "artifacts"
# region = "us-east-1"
# endpoint_url = "http://localhost:9900"
# force_path_style = true   # required for RustFS and MinIO
#
# Then assign registries to a specific backend:
# [[registries]]
# type = "github"
# name = "github"
# storage = "rustfs"   # GitHub artifacts go to RustFS; others use the default

# ── Registries ────────────────────────────────────────────────────────────────

# Permissions available:
#   releases:read  — list releases and download release assets
#   source:read    — download source tarballs
#   actions:read   — access Actions artifacts (future)
#
# Dynamic groups (from OIDC providers like Authentik):
#   [registries.rbac.groups]
#   "team-a" = ["releases:read", "source:read"]
#   "team-b" = ["releases:read"]
# A user belonging to a group sees the union of their role's registries and all their groups'.

[[registries]]
type = "github"
name = "github"
# upstreams defaults to ["https://api.github.com"] when omitted.

[registries.rbac]
anonymous = []
user = ["releases:read", "source:read"]
admin = ["*"]

# Optional: grant access to this registry for specific OIDC groups.
# [registries.rbac.groups]
# "team-a" = ["releases:read", "source:read"]

[[registries]]
type = "github"
name = "github2"
# upstreams defaults to ["https://api.github.com"] when omitted.

[registries.rbac]
anonymous = []
user = []
admin = ["*"]

# Optional: only team-b members can access this registry.
# [registries.rbac.groups]
# "team-b" = ["releases:read", "source:read"]

[[registries]]
type = "npm"
name = "npm"
# Single upstream (explicit):
# upstreams = ["https://registry.npmjs.org"]
#
# Fanout — private first, public fallback on 404:
# upstreams = [
#   "https://my-private-npm.example.com",
#   "https://registry.npmjs.org",
# ]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

[[registries]]
type = "cargo"
name = "cargo"
# upstreams defaults to ["https://crates.io"] when omitted.

[registries.cache]
# How long to cache release metadata (seconds). Default: 300 (5 min).
metadata_ttl_secs = 300
# "permanent" = once an artifact is cached it is never re-fetched.
artifact_strategy = "permanent"

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

# Release age gate: block downloads for releases published less than 1 hour ago,
# unless the caller holds an admin token.
[[registries.rules]]
kind = "release_age_gate"
min_age_secs = 3600
bypass_roles = ["admin"]

# Signed-release gate (disabled by default):
# [[registries.rules]]
# kind = "require_signed_release"
# enabled = true

# Deny "latest" version tag: force consumers to pin explicit versions.
# Admins (or any listed role) may still use "latest".
# [[registries.rules]]
# kind = "deny_latest"
# bypass_roles = ["admin"]

[[registries]]
type = "goproxy"
name = "go"
# upstreams defaults to ["https://proxy.golang.org"] when omitted.
# For air-gapped environments, point at an internal GOPROXY mirror:
# upstreams = ["https://goproxy.internal.example.com"]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]


[[registries]]
type = "openvsx"
name = "openvsx"
# upstreams defaults to ["https://open-vsx.org"] when omitted.
# For air-gapped environments, point at an internal OpenVSX mirror:
# upstreams = ["https://openvsx.internal.example.com"]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

# Configure the Go toolchain to use this proxy:
#   export GONOSUMCHECK="*"
#   export GONOSUMDB="*"
#   export GOPROXY="http://localhost:8080/proxy/go,direct"

# ── Self-hosted / private registry auth + TLS ────────────────────────────────
#
# Any registry block may include an [upstream_auth] table and/or a [tls] table.
# These are evaluated independently; you can use auth without custom TLS and
# vice-versa.
#
# --- Bearer token (Gitea, Forgejo, npm token, GitHub PAT, …) ---
# [[registries]]
# type = "npm"
# name = "internal-npm"
# upstreams = ["https://gitea.corp.example.com/api/packages/myorg/npm"]
#
# [registries.upstream_auth]
# type = "bearer"
# token = "npat-xxxx"
#
# --- Basic auth (Nexus, Artifactory, …) ---
# [[registries]]
# type = "cargo"
# name = "internal-cargo"
# upstreams = ["https://nexus.corp.example.com/repository/cargo-proxy/"]
#
# [registries.upstream_auth]
# type = "basic"
# username = "deploy"
# password = "s3cr3t"
#
# --- Custom header (X-API-Key or any header-based auth scheme) ---
# [[registries]]
# type = "npm"
# name = "internal-npm-key"
# upstreams = ["https://nexus.corp.example.com/repository/npm-proxy/"]
#
# [registries.upstream_auth]
# type = "header"
# name = "X-API-Key"
# value = "my-api-key"
#
# --- Custom CA certificate for self-signed TLS ---
# (combine with any of the auth variants above, or use standalone)
# [registries.tls]
# ca_cert_path = "/etc/ssl/corp-ca.pem"   # PEM-encoded CA certificate

# ── OpenTelemetry (optional) ──────────────────────────────────────────────────

