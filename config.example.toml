# batlehub — example configuration
# Copy this file to config.toml and edit as needed.

[server]
host = "0.0.0.0"
port = 8080
# Serve the built SPA from this directory (optional).
# static_dir = "./ui/dist"
# Restrict CORS to specific frontend origins in production.
# When absent, all origins are allowed (fine for local dev).
# cors_allowed_origins = ["https://batlehub.example.com"]

[database]
type = "postgresql"
url = "postgresql://batlehub:changeme@localhost:5432/batlehub"
max_connections = 10

# ── Auth providers (evaluated in order; first match wins) ─────────────────────

[[auth]]
type = "token"

[[auth.tokens]]
value = "change-me-admin-token"
role = "admin"
user_id = "admin"

[[auth.tokens]]
value = "change-me-user-token"
role = "user"
user_id = "user-1"

# Unauthenticated requests automatically receive the "anonymous" role.

# OIDC provider — JWT validation + browser SSO login.
# Works with any standards-compliant provider (Authentik, Keycloak, Dex, …).
#
# Local Authentik (docker compose --profile authentik up):
[[auth]]
type = "oidc"
issuer_url = "http://localhost:9000/application/o/proxy-auth/"
client_id = "proxy-auth"
client_secret = "proxy-auth-secret"                              # from Authentik app settings
redirect_uri = "http://localhost:8080/api/v1/auth/oidc/callback"
scopes = ["openid", "profile", "email", "groups"]
# Where to redirect after the OIDC callback. Defaults to "" (same origin as the
# backend). Set this when running the Vite dev server separately.
frontend_url = "http://localhost:5173"

# JWT claim used as the user's identifier (default: "sub").
# "preferred_username" gives a human-readable name (e.g. "akadmin") instead of a UUID.
user_id_claim = "preferred_username"

# JWT claim inspected for role mapping (default: "role").
# The value may be a string or an array of strings; the highest matching role wins.
role_claim = "groups"

# Map Authentik group names (JWT claim values) → proxy roles.
# Keys are group names as they appear in the "groups" JWT claim.
[auth.role_mappings]
"authentik Admins" = "admin"
"proxy-users" = "user"

[[auth]]
name = "oidc2"
type = "oidc"
issuer_url = "http://localhost:9000/application/o/proxy-auth/"
client_id = "proxy-auth"
client_secret = "proxy-auth-secret"                               # from Authentik app settings
redirect_uri = "http://localhost:8080/api/v1/auth/oidc2/callback"
scopes = ["openid", "profile", "email", "groups"]
# Where to redirect after the OIDC callback. Defaults to "" (same origin as the
# backend). Set this when running the Vite dev server separately.
frontend_url = "http://localhost:5173"

# JWT claim used as the user's identifier (default: "sub").
# "preferred_username" gives a human-readable name (e.g. "akadmin") instead of a UUID.
user_id_claim = "preferred_username"

# JWT claim inspected for role mapping (default: "role").
# The value may be a string or an array of strings; the highest matching role wins.
role_claim = "groups"

# Map Authentik group names (JWT claim values) → proxy roles.
# Keys are group names as they appear in the "groups" JWT claim.
[auth.role_mappings]
"authentik Admins" = "admin"
"proxy-users" = "user"

# Kubernetes service account token provider (in-cluster use).
# Validates Bearer tokens via the Kubernetes TokenReview API.
#
# [[auth]]
# type = "kubernetes"
#
# # Defaults come from the standard in-cluster mounted secrets and env vars.
# # api_server   = "https://kubernetes.default.svc"
# # ca_cert_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
# # token_path   = "/var/run/secrets/kubernetes.io/serviceaccount/token"
#
# # Audiences passed to the TokenReview API (defaults to ["batlehub"]).
# audiences = ["batlehub"]
#
# # Map Kubernetes usernames or group names to proxy roles.
# # Kubernetes sets:
# #   username: "system:serviceaccount:<namespace>:<name>"
# #   groups:   ["system:serviceaccounts", "system:serviceaccounts:<namespace>", ...]
# # The highest matching role wins when multiple keys match.
# [auth.role_mappings]
# "system:serviceaccount:prod:ci-deployer"  = "admin"
# "system:serviceaccounts:dev"              = "user"
# "system:serviceaccounts"                  = "anonymous"

# ── Cache backend ─────────────────────────────────────────────────────────────
#
# Selects the storage engine for metadata cache entries and rate-limit counters.
#
# memory   (default) — in-process HashMap; resets on restart; not shared across replicas.
# postgres            — stores entries in the database; persistent and shared.
# redis               — stores entries in Redis; persistent, shared, and lower-latency.
#
# Switch to "postgres" or "redis" when running multiple server replicas so that
# metadata cache hits and rate-limit counters are consistent across the cluster.
#
# [cache]
# type = "memory"   # default — no extra config needed
#
# [cache]
# type = "postgres"  # reuses the [database] connection pool; no extra url needed
#
# [cache]
# type  = "redis"
# url   = "redis://localhost:6379"   # required when type = "redis"

# ── Storage backend ────────────────────────────────────────────────────────────

# Single backend (legacy format — still supported):
[storage]
type = "filesystem"
path = "./tmp/storage-cache"

# Multi-backend example with RustFS (S3-compatible):
# [storage]
# default = "primary"
#
# [[storage.backends]]
# name = "primary"
# type = "filesystem"
# path = "./tmp/storage-cache"
#
# [[storage.backends]]
# name = "rustfs"
# type = "s3"
# bucket = "artifacts"
# region = "us-east-1"
# prefix = "batlehub/"      # optional: store in a subfolder inside the bucket
# endpoint_url = "http://localhost:9900"
# force_path_style = true   # required for RustFS and MinIO
#
# Then assign registries to a specific backend:
# [[registries]]
# type = "github"
# name = "github"
# storage = "rustfs"   # GitHub artifacts go to RustFS; others use the default

# ── Registries ────────────────────────────────────────────────────────────────

# Permissions available:
#   releases:read  — list releases and download release assets
#   source:read    — download source tarballs
#   actions:read   — access Actions artifacts (future)
#
# Dynamic groups (from OIDC providers like Authentik):
#   [registries.rbac.groups]
#   "team-a" = ["releases:read", "source:read"]
#   "team-b" = ["releases:read"]
# A user belonging to a group sees the union of their role's registries and all their groups'.

[[registries]]
type = "github"
name = "github"
# upstreams defaults to ["https://api.github.com"] when omitted.

[registries.rbac]
anonymous = []
user = ["releases:read", "source:read"]
admin = ["*"]

# Optional: grant access to this registry for specific OIDC groups.
# [registries.rbac.groups]
# "team-a" = ["releases:read", "source:read"]

[[registries]]
type = "github"
name = "github2"
# upstreams defaults to ["https://api.github.com"] when omitted.

[registries.rbac]
anonymous = []
user = []
admin = ["*"]

# Optional: only team-b members can access this registry.
# [registries.rbac.groups]
# "team-b" = ["releases:read", "source:read"]

[[registries]]
type = "npm"
name = "npm"
# Single upstream (explicit):
# upstreams = ["https://registry.npmjs.org"]
#
# Fanout — private first, public fallback on 404:
# upstreams = [
#   "https://my-private-npm.example.com",
#   "https://registry.npmjs.org",
# ]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

[[registries]]
type = "cargo"
name = "cargo"
# upstreams defaults to ["https://crates.io"] when omitted.

[registries.cache]
# How long to cache release metadata (seconds). Default: 300 (5 min).
metadata_ttl_secs = 300
# Omitting artifact_ttl_secs means artifacts are kept forever (until eviction).
# Uncomment to re-fetch artifacts older than 30 days:
# artifact_ttl_secs = 2592000

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

# Release age gate: block downloads for releases published less than 1 hour ago,
# unless the caller holds an admin token.
[[registries.rules]]
kind = "release_age_gate"
min_age_secs = 3600
bypass_roles = ["admin"]

# Signed-release gate (disabled by default):
# [[registries.rules]]
# kind = "require_signed_release"
# enabled = true

# Deny "latest" version tag: force consumers to pin explicit versions.
# Admins (or any listed role) may still use "latest".
# [[registries.rules]]
# kind = "deny_latest"
# bypass_roles = ["admin"]

[[registries]]
type = "goproxy"
name = "go"
# upstreams defaults to ["https://proxy.golang.org"] when omitted.
# For air-gapped environments, point at an internal GOPROXY mirror:
# upstreams = ["https://goproxy.internal.example.com"]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]


[[registries]]
type = "openvsx"
name = "openvsx"
# upstreams defaults to ["https://open-vsx.org"] when omitted.
# For air-gapped environments, point at an internal OpenVSX mirror:
# upstreams = ["https://openvsx.internal.example.com"]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

# Configure the Go toolchain to use this proxy:
#   export GONOSUMCHECK="*"
#   export GONOSUMDB="*"
#   export GOPROXY="http://localhost:8080/proxy/go,direct"

[[registries]]
type = "terraform"
name = "terraform"
# upstreams defaults to ["https://registry.terraform.io"] when omitted.
# For air-gapped environments, point at an internal Terraform registry mirror:
# upstreams = ["https://terraform.internal.example.com"]

[registries.rbac]
anonymous = ["releases:read", "source:read"]
user = ["releases:read", "source:read"]
admin = ["*"]

# Configure Terraform to use this proxy for providers:
#   # ~/.terraformrc  (or %APPDATA%/terraform.rc on Windows)
#   provider_installation {
#     network_mirror {
#       url = "http://localhost:8080/proxy/terraform/"
#     }
#   }
#
# Configure Terraform modules:
#   source = "localhost:8080/proxy/terraform/hashicorp/consul/aws"

# ── Rate limiting ─────────────────────────────────────────────────────────────
#
# Rate limiting can be added to any registry. Uses a fixed-window counter
# algorithm backed by the [cache] backend (memory / postgres / redis).
#
# With [cache] type = "memory" (default): counters are per-process and reset on
# restart. With type = "postgres" or type = "redis": counters are shared across
# all server replicas and survive restarts.
#
# Per-user limit: each authenticated user gets their own counter; anonymous
# requests are grouped by client IP address.
#
# Per-group limit: all members of a named group share a single counter. Group
# names are matched against Identity.groups (namespaced by provider:
# "oidc:ci-bots", "kubernetes:ops", etc.).
#
# Both limits apply independently — a request must pass every applicable
# counter (user counter AND all relevant group counters) to be allowed.
#
# Example: 100/min per user, with a shared 5000/min pool for CI bots:
#
# [registries.rate_limit]
# requests_per_window = 100
# window_secs         = 60
# enforcement         = "block"   # or "warn" to allow but add X-RateLimit-Warning header
#
# [[registries.rate_limit.groups]]
# name                = "oidc:ci-bots"   # exact match against Identity.groups
# requests_per_window = 5000             # shared pool for ALL ci-bots members combined
# window_secs         = 60
# # enforcement = "block"               # optional; inherits parent enforcement when omitted
#
# [[registries.rate_limit.groups]]
# name                = "oidc:free-tier"
# requests_per_window = 200              # more restrictive shared pool for free-tier
# window_secs         = 60
#
# Response headers added by the rate limiter:
#   X-RateLimit-Limit: {binding_limit}   — always on proxy responses when configured
#   Retry-After: {seconds}               — on 429 / warn responses
#   X-RateLimit-Reset: {unix_timestamp}  — on 429 responses
#   X-RateLimit-Warning: rate-limit-exceeded  — on warn-mode overruns

# ── RubyGems registry ────────────────────────────────────────────────────────
#
# Proxy mode: mirrors rubygems.org gem downloads, info, and version listing.
# Local/hybrid mode: accepts `gem push` for private gems.
#
# [[registries]]
# type = "rubygems"
# name = "gems"
# # mode = "proxy"           # default
# # upstreams = ["https://rubygems.org"]  # default upstream
#
# # Hybrid example (fall through to rubygems.org when gem not found locally):
[[registries]]
type   = "rubygems"
name   = "my-gems"
mode   = "hybrid"
upstreams = ["https://rubygems.org"]

# ── PHP Composer registry ────────────────────────────────────────────────────
#
# Proxy mode: mirrors Packagist metadata and dist artifacts.
# Local/hybrid mode: accepts ZIP uploads for private packages.
#
# Point Composer clients at: http(s)://your-host/proxy/{name}
# In your project's composer.json:
#   "repositories": [{"type": "composer", "url": "https://your-host/proxy/packagist"}]
#
# [[registries]]
# type = "composer"
# name = "packagist"
# # mode = "proxy"                              # default
# # upstreams = ["https://repo.packagist.org"]  # default upstream
#
# # Hybrid example — serve private packages, fall through to Packagist for the rest:
[[registries]]
type   = "composer"
name   = "my-composer"
mode   = "hybrid"
upstreams = ["https://repo.packagist.org"]

# --- Maven Central registry --------------------------------------------------
#
# Proxy mode: mirrors Maven Central artifact downloads, POM info, and version listing.
# Local/hybrid mode: accepts `mvn deploy` for private artifacts.
[[registries]]
type   = "maven"
name   = "my-maven"
mode   = "hybrid"
upstreams = ["https://repo1.maven.org/maven2/"]

# ── Versioning policies (local/hybrid mode) ──────────────────────────────────
#
# Enforce versioning rules at publish time. Violations return HTTP 422.
# All fields are optional; omit the entire [versioning] block to disable.
#
# [[registries]]
# type = "cargo"
# name = "internal-crates"
# mode = "local"
#
# [registries.versioning]
# enforce_semver   = true          # reject non-semver versions (e.g. "1.0.0-foo" is OK, "1.0" is not)
# allow_prerelease = false         # reject pre-release versions (e.g. "1.0.0-beta.1")
# version_pattern  = "^\\d+\\.\\d+\\.\\d+$"   # optional regex; must match full version string

# ── Artifact signing (local/hybrid mode) ─────────────────────────────────────
#
# Accept and store artifact signatures supplied via publish-time HTTP headers:
#   X-Artifact-Signature: <base64-encoded signature bytes>
#   X-Signature-Type: pgp                    # or "ed25519", etc.
#
# Stored signatures are returned on download as the same headers.
# All fields are optional; omit the entire [signing] block to disable enforcement.
#
# [[registries]]
# type = "npm"
# name = "signed-npm"
# mode = "local"
#
# [registries.signing]
# required      = true             # reject publishes that omit X-Artifact-Signature
# allowed_types = ["pgp", "ed25519"]   # if non-empty, reject any other type

# ── Beta/Pre-Release Channel (local/hybrid mode) ─────────────────────────────
#
# When enabled, pre-release versions (semver pre-release component, e.g. 1.0.0-beta.1)
# are hidden from version listings and artifact downloads for users who are NOT members
# of the registry's beta channel.
#
# Members are managed via the admin API:
#   POST   /api/v1/admin/registries/{registry}/beta-channel
#   GET    /api/v1/admin/registries/{registry}/beta-channel
#   DELETE /api/v1/admin/registries/{registry}/beta-channel/{principal_type}/{principal_id}
#
# [[registries]]
# type = "npm"
# name = "my-npm"
# mode = "local"
#
# [registries.beta_channel]
# enabled = true

# ── IP-Based Blocking (fail2ban) ──────────────────────────────────────────────
#
# Automatically blocks IPs that trigger too many violation events (rate limit hits,
# auth failures) within a configurable time window. Blocked IPs receive HTTP 403
# with an X-Block-Expires header until the ban duration expires.
#
# Blocked IPs are stored in the same backend as the cache (redis/postgres/memory).
#
# Manual block management via the admin API:
#   GET    /api/v1/admin/ip-blocks
#   POST   /api/v1/admin/ip-blocks          body: { "ip": "1.2.3.4", "reason": "...", "duration_secs": 3600 }
#   DELETE /api/v1/admin/ip-blocks/{ip}
#
# [ip_blocking]
# enabled               = true
# violation_threshold   = 10       # violations before auto-block (default: 10)
# violation_window_secs = 300      # counting window in seconds (default: 300)
# ban_duration_secs     = 3600     # how long to block the IP (default: 3600)
# trigger_on_status     = [429, 401]   # HTTP status codes that count as violations

# ── Self-hosted / private registry auth + TLS ────────────────────────────────
#
# Any registry block may include an [upstream_auth] table and/or a [tls] table.
# These are evaluated independently; you can use auth without custom TLS and
# vice-versa.
#
# --- Bearer token (Gitea, Forgejo, npm token, GitHub PAT, …) ---
# [[registries]]
# type = "npm"
# name = "internal-npm"
# upstreams = ["https://gitea.corp.example.com/api/packages/myorg/npm"]
#
# [registries.upstream_auth]
# type = "bearer"
# token = "npat-xxxx"
#
# --- Basic auth (Nexus, Artifactory, …) ---
# [[registries]]
# type = "cargo"
# name = "internal-cargo"
# upstreams = ["https://nexus.corp.example.com/repository/cargo-proxy/"]
#
# [registries.upstream_auth]
# type = "basic"
# username = "deploy"
# password = "s3cr3t"
#
# --- Custom header (X-API-Key or any header-based auth scheme) ---
# [[registries]]
# type = "npm"
# name = "internal-npm-key"
# upstreams = ["https://nexus.corp.example.com/repository/npm-proxy/"]
#
# [registries.upstream_auth]
# type = "header"
# name = "X-API-Key"
# value = "my-api-key"
#
# --- Custom CA certificate for self-signed TLS ---
# (combine with any of the auth variants above, or use standalone)
# [registries.tls]
# ca_cert_path = "/etc/ssl/corp-ca.pem"   # PEM-encoded CA certificate

# ── OpenTelemetry (optional) ──────────────────────────────────────────────────

# [otel]
# endpoint = "http://localhost:4317"
# service_name = "batlehub"
